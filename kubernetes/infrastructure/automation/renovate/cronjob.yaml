apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
  annotations:
    checkov.io/skip1: CKV_K8S_35=Renovate expects repository token settings as environment variables.
    checkov.io/skip2: CKV_K8S_40=Renovate image runs as UID 1000 by design.
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 4
      activeDeadlineSeconds: 3600
      template:
        spec:
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: renovate
              # renovate: datasource=docker depName=renovate/renovate registryUrl=https://docker.io
              image: renovate/renovate:39.4.0@sha256:91dc45f9ebf49ff2f1401559c381c3fda842f6802c67a4912a5c8608360b64fa
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              env:
                - name: LOG_LEVEL
                  value: debug
                - name: TZ
                  value: UTC
                - name: RENOVATE_CONFIG_FILE
                  value: /opt/renovate/config.json
                - name: HOME
                  value: /tmp/renovate
                - name: RENOVATE_CACHE_DIR
                  value: /tmp/renovate/cache
                - name: RENOVATE_DOCKER_MAX_PAGES
                  value: "200"
              envFrom:
                - secretRef:
                    name: renovate-token
              volumeMounts:
                - name: config-volume
                  mountPath: /opt/renovate
                  readOnly: true
                - name: cache-volume
                  mountPath: /tmp/renovate
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 2Gi
          volumes:
            - name: config-volume
              configMap:
                name: renovate-config
            - name: cache-volume
              emptyDir:
                sizeLimit: 1Gi
