apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: reloader
  install:
    createNamespace: true
  chart:
    spec:
      chart: reloader
      # renovate: datasource=helm depName=reloader registryUrl=https://stakater.github.io/stakater-charts
      version: "2.2.11"
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: flux-system
      interval: 1h
  values:
    reloader:
      autoReloadAll: false
      watchGlobally: true
      reloadStrategy: annotations
      ignoreJobs: true
      ignoreCronJobs: true
      deployment:
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 150m
            memory: 512Mi
