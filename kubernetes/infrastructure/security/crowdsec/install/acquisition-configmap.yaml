apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-acquisition
  namespace: crowdsec
  labels:
    reconcile.fluxcd.io/watch: "Enabled"
data:
  values.yaml: |
    agent:
      acquisition:
        - namespace: traefik
          podName: traefik-*
          program: traefik
        - namespace: authentik
          podName: authentik-*
          program: authentik
        - namespace: development
          podName: gitea-*
          program: gitea
      additionalAcquisition:
        - source: file
          filenames:
            - /var/log/containers/nextcloud-main-*_nextcloud_log-tailer-*.log
          labels:
            type: containerd
            program: nextcloud
