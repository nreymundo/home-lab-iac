apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-pg
  namespace: authentik
  labels:
    release: observability-kube-prometheus-stack
spec:
  inheritedMetadata:
    labels:
      recurring-job.longhorn.io/source: enabled
      recurring-job.longhorn.io/backup-daily: enabled
      recurring-job.longhorn.io/backup-weekly: enabled
  instances: 1
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
  monitoring:
    enablePodMonitor: false
  storage:
    size: 10Gi
    storageClass: longhorn-r2

  postgresql:
    parameters:
      wal_level: "logical"
      archive_timeout: "5min"
      archive_mode: "off"


  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-db-secrets
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: authentik-pg-backup
  namespace: authentik
spec:
  schedule: "0 0 0 * * *"
  suspend: true
  backupOwnerReference: self
  cluster:
    name: authentik-pg
  method: barmanObjectStore
