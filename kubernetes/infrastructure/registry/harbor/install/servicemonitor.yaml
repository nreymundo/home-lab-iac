apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: harbor
  namespace: harbor
  labels:
    release: observability-kube-prometheus-stack
spec:
  endpoints:
    - honorLabels: true
      port: http-metrics
  jobLabel: app.kubernetes.io/name
  selector:
    matchLabels:
      app: harbor
      release: harbor-harbor
