apiVersion: batch/v1
kind: CronJob
metadata:
  name: harbor-bootstrap
  namespace: harbor
spec:
  schedule: "17 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 900
      template:
        spec:
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: bootstrap
              image: docker.io/library/python:3.13-alpine@sha256:399babc8b49529dabfd9c922f2b5eea81d611e4512e3ed250d75bd2e7683f4b0
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              command:
                - python
                - /scripts/bootstrap.py
              env:
                - name: HARBOR_API
                  value: http://harbor-harbor-core/api/v2.0
                - name: HARBOR_USERNAME
                  value: admin
                - name: HARBOR_OIDC_ENDPOINT
                  value: https://sso.${CLUSTER_DOMAIN}/application/o/harbor/
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
                - name: harbor-admin
                  mountPath: /secrets/harbor
                  readOnly: true
                - name: harbor-oidc
                  mountPath: /secrets/oidc
                  readOnly: true
                - name: dockerhub
                  mountPath: /secrets/dockerhub
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
          volumes:
            - name: script
              configMap:
                name: harbor-bootstrap
            - name: harbor-admin
              secret:
                secretName: harbor-secrets
                defaultMode: 288
                items:
                  - key: HARBOR_ADMIN_PASSWORD
                    path: password
            - name: harbor-oidc
              secret:
                secretName: harbor-sso-secret
                defaultMode: 288
                items:
                  - key: CLIENT_ID
                    path: client-id
                  - key: CLIENT_SECRET
                    path: client-secret
            - name: dockerhub
              secret:
                secretName: harbor-bootstrap-secret
                optional: true
                defaultMode: 288
                items:
                  - key: DOCKERHUB_USERNAME
                    path: username
                    optional: true
                  - key: DOCKERHUB_TOKEN
                    path: token
                    optional: true
            - name: tmp
              emptyDir:
                sizeLimit: 64Mi
