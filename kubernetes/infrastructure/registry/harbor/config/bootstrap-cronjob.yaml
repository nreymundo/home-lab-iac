apiVersion: batch/v1
kind: CronJob
metadata:
  name: harbor-bootstrap
  namespace: harbor
  annotations:
    checkov.io/skip1: CKV_K8S_35=Harbor bootstrap script consumes API credentials from environment variables.
spec:
  schedule: "17 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 900
      template:
        spec:
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: bootstrap
              image: docker.io/library/python:3.13-alpine
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              command:
                - python
                - /scripts/bootstrap.py
              env:
                - name: HARBOR_API
                  value: http://harbor-harbor-core/api/v2.0
                - name: HARBOR_USERNAME
                  value: admin
                - name: HARBOR_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: harbor-secrets
                      key: HARBOR_ADMIN_PASSWORD
                - name: HARBOR_OIDC_ENDPOINT
                  value: https://sso.${CLUSTER_DOMAIN}/application/o/harbor/
                - name: HARBOR_OIDC_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: harbor-sso-secret
                      key: CLIENT_ID
                - name: HARBOR_OIDC_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: harbor-sso-secret
                      key: CLIENT_SECRET
                - name: DOCKERHUB_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: harbor-bootstrap-secret
                      key: DOCKERHUB_USERNAME
                      optional: true
                - name: DOCKERHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: harbor-bootstrap-secret
                      key: DOCKERHUB_TOKEN
                      optional: true
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
          volumes:
            - name: script
              configMap:
                name: harbor-bootstrap
            - name: tmp
              emptyDir:
                sizeLimit: 64Mi
