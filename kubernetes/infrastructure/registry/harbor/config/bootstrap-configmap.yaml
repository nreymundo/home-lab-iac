apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-bootstrap
  namespace: harbor
data:
  bootstrap.py: |
    import base64
    import json
    import os
    import sys
    import time
    import urllib.error
    import urllib.parse
    import urllib.request

    api = os.environ.get("HARBOR_API", "http://harbor-harbor-core/api/v2.0").rstrip("/")
    username = os.environ.get("HARBOR_USERNAME", "admin")
    password = os.environ["HARBOR_PASSWORD"]
    gib = 1024 ** 3

    def env(name, default=""):
        return os.environ.get(name, default).strip()

    def auth_header():
        token = base64.b64encode(f"{username}:{password}".encode()).decode()
        return {"Authorization": f"Basic {token}"}

    def request(method, path, body=None, ok=(200, 201, 202, 204, 409, 404)):
        data = None
        headers = {"Accept": "application/json", **auth_header()}
        if body is not None:
            data = json.dumps(body).encode()
            headers["Content-Type"] = "application/json"
        req = urllib.request.Request(api + path, data=data, headers=headers, method=method)
        try:
            with urllib.request.urlopen(req, timeout=30) as resp:
                content = resp.read().decode()
                parsed = json.loads(content) if content else None
                return resp.status, parsed, dict(resp.headers)
        except urllib.error.HTTPError as exc:
            content = exc.read().decode()
            if exc.code in ok:
                parsed = json.loads(content) if content else None
                return exc.code, parsed, dict(exc.headers)
            raise RuntimeError(f"{method} {path} failed with {exc.code}: {content}") from exc

    def wait_for_harbor():
        for _ in range(90):
            try:
                status, _, _ = request("GET", "/health", ok=(200, 503))
                if status == 200:
                    return
            except Exception as exc:
                print(f"waiting for Harbor: {exc}", flush=True)
            time.sleep(10)
        raise TimeoutError("Harbor did not become healthy")

    def configure_oidc():
        client_id = env("HARBOR_OIDC_CLIENT_ID")
        client_secret = env("HARBOR_OIDC_CLIENT_SECRET")
        if not client_id or not client_secret:
            raise RuntimeError("Harbor OIDC client secret is unavailable")

        oidc_endpoint = env("HARBOR_OIDC_ENDPOINT")
        payload = {
            "auth_mode": "oidc_auth",
            "primary_auth_mode": True,
            "oidc_name": "Authentik",
            "oidc_endpoint": oidc_endpoint,
            "oidc_client_id": client_id,
            "oidc_client_secret": client_secret,
            "oidc_groups_claim": "groups",
            "oidc_admin_group": "Harbor Admin",
            "oidc_group_filter": "^Harbor (Admin|Users)$",
            "oidc_scope": "openid,email,profile,offline_access,groups",
            "oidc_user_claim": "preferred_username",
            "oidc_verify_cert": True,
            "oidc_auto_onboard": True,
            "oidc_logout": True,
        }
        request("POST", "/system/oidc/ping", {"url": oidc_endpoint, "verify_cert": True}, ok=(200,))
        request("PUT", "/configurations", payload, ok=(200,))
        print("configured Harbor OIDC authentication", flush=True)

    def list_registries():
        status, body, _ = request("GET", "/registries?page_size=100", ok=(200,))
        return body or []

    def ensure_registry(spec):
        for registry in list_registries():
            if registry.get("name") == spec["name"]:
                if registry.get("url") != spec["url"]:
                    raise RuntimeError(f"registry endpoint {spec['name']} exists with unexpected url")
                if registry.get("type") != spec["type"]:
                    request("DELETE", f"/registries/{registry['id']}", ok=(200,))
                    print(f"deleted registry endpoint {spec['name']} with unsupported type", flush=True)
                    break
                access_key = spec.get("access_key", "")
                access_secret = spec.get("access_secret", "")
                if access_key and access_secret and access_key != "REPLACE_ME" and access_secret != "REPLACE_ME":
                    request(
                        "PUT",
                        f"/registries/{registry['id']}",
                        {
                            "name": spec["name"],
                            "description": spec["description"],
                            "url": spec["url"],
                            "credential_type": "basic",
                            "access_key": access_key,
                            "access_secret": access_secret,
                            "insecure": False,
                        },
                        ok=(200,),
                    )
                print(f"registry endpoint {spec['name']} exists", flush=True)
                return registry["id"]

        payload = {
            "name": spec["name"],
            "description": spec["description"],
            "type": spec["type"],
            "url": spec["url"],
            "insecure": False,
        }
        access_key = spec.get("access_key", "")
        access_secret = spec.get("access_secret", "")
        if access_key and access_secret and access_key != "REPLACE_ME" and access_secret != "REPLACE_ME":
            payload["credential"] = {
                "type": "basic",
                "access_key": access_key,
                "access_secret": access_secret,
            }

        request("POST", "/registries", payload, ok=(201,))
        for registry in list_registries():
            if registry.get("name") == spec["name"]:
                print(f"created registry endpoint {spec['name']}", flush=True)
                return registry["id"]
        raise RuntimeError(f"registry endpoint {spec['name']} was not returned after creation")

    def get_project(name):
        encoded = urllib.parse.quote(name, safe="")
        status, body, _ = request("GET", f"/projects/{encoded}?is_resource_name=true", ok=(200, 404))
        return body if status == 200 else None

    def project_id(project):
        identifier = project.get("project_id") or project.get("id")
        if identifier is None:
            raise RuntimeError(f"project {project.get('name')} has no id")
        return int(identifier)

    def ensure_proxy_project(name, registry_id, storage_limit):
        project = get_project(name)
        if project:
            if project.get("registry_id") != registry_id:
                raise RuntimeError(f"project {name} exists but is not linked to registry {registry_id}")
            metadata = project.get("metadata") or {}
            if metadata.get("public") != "true":
                encoded = urllib.parse.quote(name, safe="")
                request("PUT", f"/projects/{encoded}?is_resource_name=true", {"metadata": {"public": "true"}}, ok=(200,))
                project = get_project(name)
            print(f"proxy project {name} exists", flush=True)
            return project

        payload = {
            "project_name": name,
            "registry_id": registry_id,
            "public": True,
            "metadata": {
                "public": "true",
                "auto_scan": "false",
                "enable_content_trust": "false",
                "prevent_vul": "false",
                "reuse_sys_cve_allowlist": "true",
            },
            "storage_limit": storage_limit,
        }
        request("POST", "/projects", payload, ok=(201,))
        print(f"created proxy project {name}", flush=True)
        return get_project(name)

    def ensure_project_quota(project, storage_limit):
        pid = project_id(project)
        query = urllib.parse.urlencode({"reference": "project", "reference_id": str(pid)})
        _, body, _ = request("GET", f"/quotas?{query}", ok=(200,))
        quotas = body or []
        if not quotas:
            raise RuntimeError(f"project {project.get('name')} has no quota record")

        quota = quotas[0]
        hard = quota.get("hard") or {}
        if hard.get("storage") == storage_limit:
            print(f"quota for project {project.get('name')} is current", flush=True)
            return

        updated_hard = dict(hard)
        updated_hard["storage"] = storage_limit
        request("PUT", f"/quotas/{quota['id']}", {"hard": updated_hard}, ok=(200,))
        print(f"configured quota for project {project.get('name')}", flush=True)

    def retention_policy(project, retention_id=None):
        policy = {
            "algorithm": "or",
            "rules": [
                {
                    "id": 1,
                    "priority": 1,
                    "disabled": False,
                    "action": "retain",
                    "template": "nDaysSinceLastPull",
                    "params": {"nDaysSinceLastPull": 30},
                    "tag_selectors": [
                        {"kind": "doublestar", "decoration": "matches", "pattern": "**"}
                    ],
                    "scope_selectors": {
                        "repository": [
                            {"kind": "doublestar", "decoration": "repoMatches", "pattern": "**"}
                        ]
                    },
                }
            ],
            "trigger": {
                "kind": "Schedule",
                "settings": {"cron": "0 0 0 * * *"},
            },
            "scope": {"level": "project", "ref": project_id(project)},
        }
        if retention_id is not None:
            policy["id"] = int(retention_id)
        return policy

    def ensure_retention_policy(project):
        name = project.get("name")
        metadata = project.get("metadata") or {}
        retention_id = metadata.get("retention_id")
        if retention_id:
            request("PUT", f"/retentions/{retention_id}", retention_policy(project, retention_id), ok=(200,))
            print(f"configured 30-day retention for project {name}", flush=True)
            return

        request("POST", "/retentions", retention_policy(project), ok=(201,))
        print(f"created 30-day retention for project {name}", flush=True)

    def gc_schedule():
        return {
            "parameters": {
                "delete_untagged": True,
                "delete_tag": True,
                "workers": 1,
            },
            "schedule": {
                "type": "Custom",
                "cron": "0 0 1 * * *",
            },
        }

    def gc_schedule_current(body, desired):
        if not body:
            return False
        schedule = body.get("schedule") or {}
        if schedule.get("type") != desired["schedule"]["type"]:
            return False
        if schedule.get("cron") != desired["schedule"]["cron"]:
            return False

        parameters = {}
        if body.get("job_parameters"):
            parameters = json.loads(body["job_parameters"])
        for key, value in desired["parameters"].items():
            if parameters.get(key) != value:
                return False
        return True

    def ensure_gc_schedule():
        desired = gc_schedule()
        _, body, _ = request("GET", "/system/gc/schedule", ok=(200,))
        if gc_schedule_current(body, desired):
            print("garbage collection schedule is current", flush=True)
            return
        if body:
            request("PUT", "/system/gc/schedule", desired, ok=(200,))
            print("configured garbage collection schedule", flush=True)
            return

        request("POST", "/system/gc/schedule", desired, ok=(201,))
        print("created garbage collection schedule", flush=True)

    wait_for_harbor()
    configure_oidc()

    registries = [
        {
            "name": "dockerhub",
            "description": "Docker Hub proxy cache upstream",
            "type": "docker-hub",
            "url": "https://hub.docker.com",
            "access_key": env("DOCKERHUB_USERNAME"),
            "access_secret": env("DOCKERHUB_TOKEN"),
            "storage_limit": 40 * gib,
        },
        {
            "name": "ghcr",
            "description": "GitHub Container Registry proxy cache upstream",
            "type": "github-ghcr",
            "url": "https://ghcr.io",
            "storage_limit": 20 * gib,
        },
        {
            "name": "lscr",
            "description": "LinuxServer registry proxy cache upstream",
            "type": "docker-registry",
            "url": "https://lscr.io",
            "storage_limit": 10 * gib,
        },
        {
            "name": "quay",
            "description": "Quay proxy cache upstream",
            "type": "docker-registry",
            "url": "https://quay.io",
            "storage_limit": 10 * gib,
        },
        {
            "name": "n8n",
            "description": "n8n registry proxy cache upstream",
            "type": "docker-registry",
            "url": "https://docker.n8n.io",
            "storage_limit": 10 * gib,
        },
        {
            "name": "gitea",
            "description": "Gitea registry proxy cache upstream",
            "type": "docker-registry",
            "url": "https://docker.gitea.com",
            "storage_limit": 10 * gib,
        },
    ]

    for spec in registries:
        registry_id = ensure_registry(spec)
        project = ensure_proxy_project(spec["name"], registry_id, spec["storage_limit"])
        ensure_project_quota(project, spec["storage_limit"])
        ensure_retention_policy(project)

    ensure_gc_schedule()

    print("Harbor bootstrap complete", flush=True)
