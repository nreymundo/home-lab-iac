apiVersion: v1
kind: ConfigMap
metadata:
  name: opentelemetry-collector-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  opentelemetry-collector.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(otelcol_receiver_accepted_metric_points_total[$__rate_interval]))",
              "legendFormat": "metric points/s",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Accepted Metric Points",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 8,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(otelcol_receiver_accepted_spans_total[$__rate_interval]))",
              "legendFormat": "spans/s",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Accepted Spans",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(otelcol_receiver_accepted_log_records_total[$__rate_interval]))",
              "legendFormat": "records/s",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Accepted Log Records",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "max": 100,
              "min": 0,
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 6
          },
          "id": 4,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "max"
              ],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "100 * otelcol_exporter_queue_size / otelcol_exporter_queue_capacity",
              "legendFormat": "{{exporter}} {{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Exporter Queue Utilization",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 6
          },
          "id": 5,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull"
              ],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (exporter) (rate(otelcol_exporter_send_failed_metric_points_total[$__rate_interval]))",
              "legendFormat": "{{exporter}} metrics",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "sum by (exporter) (rate(otelcol_exporter_send_failed_spans_total[$__rate_interval]))",
              "legendFormat": "{{exporter}} spans",
              "range": true,
              "refId": "B"
            },
            {
              "editorMode": "code",
              "expr": "sum by (exporter) (rate(otelcol_exporter_send_failed_log_records_total[$__rate_interval]))",
              "legendFormat": "{{exporter}} logs",
              "range": true,
              "refId": "C"
            }
          ],
          "title": "Exporter Failures",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "id": 6,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull"
              ],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (receiver) (rate(otelcol_receiver_refused_metric_points_total[$__rate_interval]))",
              "legendFormat": "{{receiver}} metrics",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "sum by (receiver) (rate(otelcol_receiver_refused_spans_total[$__rate_interval]))",
              "legendFormat": "{{receiver}} spans",
              "range": true,
              "refId": "B"
            },
            {
              "editorMode": "code",
              "expr": "sum by (receiver) (rate(otelcol_receiver_refused_log_records_total[$__rate_interval]))",
              "legendFormat": "{{receiver}} logs",
              "range": true,
              "refId": "C"
            }
          ],
          "title": "Receiver Refusals",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 41,
      "tags": [
        "opentelemetry",
        "collector"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "OpenTelemetry Collector",
      "uid": "opentelemetry-collector",
      "version": 1
    }
