apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy-syslog
  namespace: flux-system
spec:
  interval: 30m
  releaseName: alloy-syslog
  targetNamespace: observability

  install:
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: alloy
      # renovate: datasource=helm depName=alloy registryUrl=https://grafana.github.io/helm-charts
      version: "1.8.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 12h

  values:
    controller:
      type: deployment
      replicas: 1

    service:
      type: ClusterIP

    serviceAccount:
      create: true

    serviceMonitor:
      enabled: true
      additionalLabels:
        release: observability-kube-prometheus-stack

    alloy:
      extraPorts:
        - name: syslog-tcp
          port: 1514
          targetPort: 1514
          protocol: TCP
        - name: syslog-udp
          port: 1514
          targetPort: 1514
          protocol: UDP
        - name: sys5424-tcp
          port: 2514
          targetPort: 2514
          protocol: TCP
        - name: sys5424-udp
          port: 2514
          targetPort: 2514
          protocol: UDP
      configMap:
        create: true
        content: |
          logging {
            level = "info"
          }

          loki.relabel "syslog_metadata" {
            rule {
              action        = "replace"
              source_labels = ["__syslog_connection_ip_address"]
              target_label  = "source_ip"
            }

            rule {
              action        = "replace"
              source_labels = ["__syslog_connection_hostname"]
              target_label  = "connection_hostname"
            }

            rule {
              action        = "replace"
              source_labels = ["__syslog_message_hostname"]
              target_label  = "hostname"
            }

            rule {
              action        = "replace"
              source_labels = ["__syslog_message_app_name"]
              target_label  = "app_name"
            }

            rule {
              action        = "replace"
              source_labels = ["__syslog_message_facility"]
              target_label  = "facility"
            }

            rule {
              action        = "replace"
              source_labels = ["__syslog_message_severity"]
              target_label  = "severity"
            }

            rule {
              action        = "replace"
              source_labels = ["__syslog_message_severity"]
              target_label  = "detected_level"
            }

            rule {
              action        = "replace"
              source_labels = ["__syslog_message_severity"]
              regex         = "(?i)(emerg|emergency|alert|crit|critical)"
              replacement   = "critical"
              target_label  = "detected_level"
            }

            rule {
              action        = "replace"
              source_labels = ["__syslog_message_severity"]
              regex         = "(?i)(err|error)"
              replacement   = "error"
              target_label  = "detected_level"
            }

            rule {
              action        = "replace"
              source_labels = ["__syslog_message_severity"]
              regex         = "(?i)(warn|warning)"
              replacement   = "warn"
              target_label  = "detected_level"
            }

            rule {
              action        = "replace"
              source_labels = ["__syslog_message_severity"]
              regex         = "(?i)(notice|informational|info)"
              replacement   = "info"
              target_label  = "detected_level"
            }

            rule {
              action        = "replace"
              source_labels = ["__syslog_message_severity"]
              regex         = "(?i)(debug)"
              replacement   = "debug"
              target_label  = "detected_level"
            }

            forward_to = []
          }

          loki.source.syslog "tcp" {
            listener {
              address       = "0.0.0.0:1514"
              protocol      = "tcp"
              syslog_format = "rfc3164"
              labels = {
                job       = "syslog",
                receiver  = "alloy-syslog",
                format    = "rfc3164",
                transport = "tcp",
              }
            }

            relabel_rules = loki.relabel.syslog_metadata.rules

            forward_to = [loki.process.syslog_body.receiver]
          }

          loki.source.syslog "udp" {
            listener {
              address       = "0.0.0.0:1514"
              protocol      = "udp"
              syslog_format = "rfc3164"
              labels = {
                job       = "syslog",
                receiver  = "alloy-syslog",
                format    = "rfc3164",
                transport = "udp",
              }
            }

            relabel_rules = loki.relabel.syslog_metadata.rules

            forward_to = [loki.process.syslog_body.receiver]
          }

          loki.source.syslog "tcp_rfc5424" {
            listener {
              address       = "0.0.0.0:2514"
              protocol      = "tcp"
              syslog_format = "rfc5424"
              labels = {
                job       = "syslog",
                receiver  = "alloy-syslog",
                format    = "rfc5424",
                transport = "tcp",
              }
            }

            relabel_rules = loki.relabel.syslog_metadata.rules

            forward_to = [loki.process.syslog_body.receiver]
          }

          loki.source.syslog "udp_rfc5424" {
            listener {
              address       = "0.0.0.0:2514"
              protocol      = "udp"
              syslog_format = "rfc5424"
              labels = {
                job       = "syslog",
                receiver  = "alloy-syslog",
                format    = "rfc5424",
                transport = "udp",
              }
            }

            relabel_rules = loki.relabel.syslog_metadata.rules

            forward_to = [loki.process.syslog_body.receiver]
          }

          loki.process "syslog_body" {
            stage.match {
              selector = "{hostname=\"opnsense.local\", app_name=\"filterlog\"}"

              stage.regex {
                expression = "^(?:[^,]*,){4}(?P<opnsense_interface>[^,]*),(?:[^,]*),(?P<opnsense_action>[^,]*),(?P<opnsense_direction>[^,]*)(?:,.*)?$"
                labels_from_groups = true
              }
            }

            forward_to = [loki.write.default.receiver]
          }

          loki.write "default" {
            endpoint {
              url = "http://observability-loki-gateway.observability.svc.cluster.local:80/loki/api/v1/push"
            }
          }

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
