apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
  namespace: ai
data:
  librechat.yaml: |
    version: 1.3.5
    cache: true

    interface:
      endpointsMenu: true
      modelSelect: true
      parameters: true

    endpoints:
      custom:
        - name: LiteLLM
          apiKey: "${LITELLM_API_KEY}"
          baseURL: "http://litellm.ai.svc.cluster.local:4000/v1"
          models:
            fetch: true
          modelDisplayLabel: LiteLLM
