apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
  namespace: ai
data:
  librechat.yaml: |
    version: 1.3.5
    cache: true

    interface:
      endpointsMenu: true
      modelSelect: true
      parameters: true

    endpoints:
      custom:
        - name: LiteLLM
          apiKey: "$${LITELLM_API_KEY}"
          baseURL: "http://litellm-main:4000/v1"
          models:
            default:
              - openai/gpt-5.5
              - openai/gpt-5.4
              - openai/gpt-5.4-mini
            fetch: true
          modelDisplayLabel: LiteLLM
