apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai
data:
  config.yaml: |
    model_list:
      - model_name: openai/gpt-5.5
        model_info:
          mode: responses
          max_input_tokens: 272000
        litellm_params:
          model: chatgpt/gpt-5.5
          # Synthetic OpenAI API-equivalent Standard pricing, in USD/token.
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.00003

      - model_name: openai/gpt-5.4
        model_info:
          mode: responses
          max_input_tokens: 272000
        litellm_params:
          model: chatgpt/gpt-5.4
          # Synthetic OpenAI API-equivalent Standard pricing, in USD/token.
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015

      - model_name: openai/gpt-5.4-mini
        model_info:
          mode: responses
          max_input_tokens: 272000
        litellm_params:
          model: chatgpt/gpt-5.4-mini
          # Synthetic OpenAI API-equivalent Standard pricing, in USD/token.
          input_cost_per_token: 0.00000075
          output_cost_per_token: 0.0000045

      - model_name: openai/gpt-5.3-codex
        model_info:
          mode: responses
          max_input_tokens: 272000
          supports_xhigh_reasoning_effort: true
        litellm_params:
          model: chatgpt/gpt-5.3-codex
          # Synthetic OpenAI API-equivalent Standard pricing, in USD/token.
          input_cost_per_token: 0.00000175
          output_cost_per_token: 0.000014

      - model_name: openai/gpt-5.3-codex-spark
        model_info:
          mode: responses
          max_input_tokens: 272000
          supports_xhigh_reasoning_effort: true
        litellm_params:
          model: chatgpt/gpt-5.3-codex-spark
          # Priced as gpt-5.3-codex; OpenAI does not list a separate Spark API rate.
          input_cost_per_token: 0.00000175
          output_cost_per_token: 0.000014

      - model_name: openai/chatterbox
        model_info:
          mode: audio_speech
          health_check_voice: Abigail.wav
        litellm_params:
          model: openai/chatterbox
          custom_llm_provider: openai
          litellm_credential_name: llama-swap
          input_cost_per_token: 0.0
          output_cost_per_token: 0.0
          tags:
            - llama-swap

      - model_name: hosted_vllm/*
        model_info:
          mode: chat
          health_check_model: unsloth/qwen3-4b-instruct-2507
        litellm_params:
          model: hosted_vllm/*
          custom_llm_provider: hosted_vllm
          litellm_credential_name: llama-swap
          input_cost_per_token: 0.0
          output_cost_per_token: 0.0
          tags:
            - llama-swap
            - pve3
          guardrails: []

      - model_name: openrouter/*
        model_info:
          mode: chat
        litellm_params:
          model: openrouter/*
          custom_llm_provider: openrouter
          litellm_credential_name: openrouter
          input_cost_per_token: 0.0
          output_cost_per_token: 0.0

    credential_list:
      - credential_name: llama-swap
        credential_values:
          api_base: os.environ/LITELLM_CREDENTIAL_LLAMA_SWAP_API_BASE
          api_key: os.environ/LITELLM_CREDENTIAL_LLAMA_SWAP_API_KEY
        credential_info:
          custom_llm_provider: openai

      - credential_name: openrouter
        credential_values:
          api_key: os.environ/LITELLM_CREDENTIAL_OPENROUTER_API_KEY
        credential_info:
          custom_llm_provider: openrouter

    litellm_settings:
      callbacks:
        - cache_bypass.proxy_handler_instance
      check_provider_endpoint: true
      cache: true
      cache_params:
        type: redis
        host: litellm-valkey
        port: "6379"
        ssl: false
        ssl_check_hostname: false

    general_settings:
      store_model_in_db: true

    router_settings:
      routing_strategy: simple-shuffle
      num_retries: 2
      timeout: 6000
      max_fallbacks: 5
      allowed_fails: 3
      cooldown_time: 5
      retry_after: 0
      enable_pre_call_checks: false
      model_group_alias:
        openrouter/free: openrouter/openrouter/free
        local/tts: openai/chatterbox
        local/rerank: hosted_vllm/qwen3-reranker-0.6b
        local/stt-fast: hosted_vllm/whisper/large-v3-turbo-q5_0
        local/embedding: hosted_vllm/qwen3-embedding-0.6b
        local/stt-large: hosted_vllm/whisper/large-v3-q5_0
        local/automation-lite: hosted_vllm/unsloth/qwen3-4b-instruct-2507
        local/document-analysis: hosted_vllm/unsloth/qwen3-vl-30b-a3b-instruct
        chatgpt/latest: openai/gpt-5.5

  cache_bypass.py: |
    import json
    from typing import Literal

    from litellm.integrations.custom_logger import CustomLogger
    from litellm.proxy.proxy_server import DualCache, UserAPIKeyAuth


    class CacheBypassHandler(CustomLogger):
        async def async_pre_call_hook(
            self,
            user_api_key_dict: UserAPIKeyAuth,
            cache: DualCache,
            data: dict,
            call_type: Literal[
                "completion",
                "text_completion",
                "embeddings",
                "image_generation",
                "moderation",
                "audio_transcription",
            ],
        ):
            metadata = getattr(user_api_key_dict, "metadata", {}) or {}

            if isinstance(metadata, str):
                try:
                    metadata = json.loads(metadata)
                except json.JSONDecodeError:
                    metadata = {}

            if not isinstance(metadata, dict):
                metadata = {}

            if metadata.get("bypass_redis_cache") is True:
                cache_controls = data.setdefault("cache", {})
                cache_controls["no-cache"] = True
                cache_controls["no-store"] = True

            return data


    proxy_handler_instance = CacheBypassHandler()

  chatgpt_responses_streaming_patch.py: |
    import json

    import httpx
    import litellm
    from litellm._logging import verbose_logger
    from litellm.llms.chatgpt.responses.transformation import (
        ChatGPTResponsesAPIConfig,
        record_output_item_chunk,
        record_output_text_chunk,
    )
    from litellm.llms.custom_httpx.llm_http_handler import (
        BaseLLMHTTPHandler,
        get_async_httpx_client,
    )
    from litellm.llms.custom_httpx.http_handler import AsyncHTTPHandler
    from litellm.responses.streaming_iterator import ResponsesAPIStreamingIterator
    from litellm.types.llms.openai import ResponsesAPIStreamEvents
    from litellm.types.utils import CallTypes
    from litellm.llms.base_llm.responses.transformation import BaseResponsesAPIConfig


    _original_async_response_api_handler = BaseLLMHTTPHandler.async_response_api_handler


    class ChatGPTResponsesStreamingIterator(ResponsesAPIStreamingIterator):
        def __init__(self, *args, **kwargs):
            super().__init__(*args, **kwargs)
            self._streamed_output_items = {}
            self._text_only_output_items = {}

        def _process_chunk(self, chunk):
            if not chunk or chunk == "[DONE]":
                return super()._process_chunk(chunk)

            try:
                parsed_chunk = json.loads(chunk)
            except json.JSONDecodeError:
                return super()._process_chunk(chunk)

            if not isinstance(parsed_chunk, dict):
                return super()._process_chunk(chunk)

            event_type = parsed_chunk.get("type")
            if event_type == ResponsesAPIStreamEvents.OUTPUT_ITEM_DONE:
                record_output_item_chunk(
                    parsed_chunk=parsed_chunk,
                    output_items=self._streamed_output_items,
                )
            elif event_type == ResponsesAPIStreamEvents.OUTPUT_TEXT_DONE:
                record_output_text_chunk(
                    parsed_chunk=parsed_chunk,
                    output_items=self._streamed_output_items,
                    text_only_items=self._text_only_output_items,
                )
            elif event_type == ResponsesAPIStreamEvents.RESPONSE_COMPLETED:
                response_payload = parsed_chunk.get("response")
                if isinstance(response_payload, dict) and not response_payload.get("output"):
                    merged_items = {**self._text_only_output_items}
                    merged_items.update(self._streamed_output_items)
                    if merged_items:
                        parsed_chunk = dict(parsed_chunk)
                        parsed_chunk["response"] = dict(response_payload)
                        parsed_chunk["response"]["output"] = [
                            item for _, item in sorted(merged_items.items())
                        ]

            return super()._process_chunk(json.dumps(parsed_chunk))


    async def _chatgpt_streaming_response_api_handler(
        self,
        model,
        input,
        responses_api_provider_config,
        response_api_optional_request_params,
        custom_llm_provider,
        litellm_params,
        logging_obj,
        extra_headers=None,
        extra_body=None,
        timeout=None,
        client=None,
        fake_stream=False,
        litellm_metadata=None,
        shared_session=None,
    ):
        stream = response_api_optional_request_params.get("stream", False)
        if (
            custom_llm_provider != "chatgpt"
            or stream is not True
            or not isinstance(responses_api_provider_config, ChatGPTResponsesAPIConfig)
        ):
            return await _original_async_response_api_handler(
                self,
                model=model,
                input=input,
                responses_api_provider_config=responses_api_provider_config,
                response_api_optional_request_params=response_api_optional_request_params,
                custom_llm_provider=custom_llm_provider,
                litellm_params=litellm_params,
                logging_obj=logging_obj,
                extra_headers=extra_headers,
                extra_body=extra_body,
                timeout=timeout,
                client=client,
                fake_stream=fake_stream,
                litellm_metadata=litellm_metadata,
                shared_session=shared_session,
            )

        if client is None or not isinstance(client, AsyncHTTPHandler):
            async_httpx_client = get_async_httpx_client(
                llm_provider=litellm.LlmProviders(custom_llm_provider),
                params={"ssl_verify": litellm_params.get("ssl_verify", None)},
                shared_session=shared_session,
            )
        else:
            async_httpx_client = client

        headers = responses_api_provider_config.validate_environment(
            headers=response_api_optional_request_params.get("extra_headers", {}) or {},
            model=model,
            litellm_params=litellm_params,
        )
        headers.setdefault("Accept", "text/event-stream")
        if extra_headers:
            headers.update(extra_headers)

        api_base = responses_api_provider_config.get_complete_url(
            api_base=litellm_params.api_base,
            litellm_params=dict(litellm_params),
        )
        data = responses_api_provider_config.transform_responses_api_request(
            model=model,
            input=input,
            response_api_optional_request_params=response_api_optional_request_params,
            litellm_params=litellm_params,
            headers=headers,
        )
        data = BaseResponsesAPIConfig.normalize_responses_api_request_dict(data)
        data["stream"] = True
        if extra_body:
            data.update(extra_body)

        request_context = {"input": input}
        try:
            request_context.update(response_api_optional_request_params)
        except Exception:
            pass
        request_context["litellm_params"] = dict(litellm_params)

        logging_obj.pre_call(
            input=input,
            api_key="",
            additional_args={
                "complete_input_dict": data,
                "api_base": api_base,
                "headers": headers,
            },
        )

        try:
            req = async_httpx_client.client.build_request(
                "POST",
                api_base,
                headers=headers,
                json=data,
                timeout=timeout or float(response_api_optional_request_params.get("timeout", 0)),
            )
            response = await async_httpx_client.client.send(req, stream=True)
            response.raise_for_status()
        except Exception as exc:
            raise self._handle_error(
                e=exc,
                provider_config=responses_api_provider_config,
            )

        verbose_logger.debug("Using local ChatGPT Responses streaming patch")
        return ChatGPTResponsesStreamingIterator(
            response=response,
            model=model,
            logging_obj=logging_obj,
            responses_api_provider_config=responses_api_provider_config,
            litellm_metadata=litellm_metadata,
            custom_llm_provider=custom_llm_provider,
            request_data=request_context,
            call_type=CallTypes.responses.value,
        )


    def patch_chatgpt_responses_streaming():
        if getattr(BaseLLMHTTPHandler.async_response_api_handler, "_chatgpt_streaming_patch", False):
            return
        _chatgpt_streaming_response_api_handler._chatgpt_streaming_patch = True
        BaseLLMHTTPHandler.async_response_api_handler = _chatgpt_streaming_response_api_handler


    def worker_startup_hook():
        patch_chatgpt_responses_streaming()

  litellm_startup.py: |
    import litellm

    import chatgpt_responses_streaming_patch
    import vllm_model_discovery


    def patch_chatgpt_codex_reasoning_metadata():
        for model in ("gpt-5.3-codex", "gpt-5.3-codex-spark"):
            litellm.model_cost.setdefault(model, {})[
                "supports_xhigh_reasoning_effort"
            ] = True


    def worker_startup_hook():
        patch_chatgpt_codex_reasoning_metadata()
        vllm_model_discovery.worker_startup_hook()
        chatgpt_responses_streaming_patch.worker_startup_hook()

  vllm_model_discovery.py: |
    import os

    import litellm
    from litellm.llms.vllm.common_utils import VLLMModelInfo
    from litellm.utils import _add_path_to_api_base


    def patch_vllm_model_discovery():
        def get_models(self, api_key=None, api_base=None):
            api_base = api_base or os.environ.get("VLLM_API_BASE") or os.environ.get(
                "LITELLM_CREDENTIAL_LLAMA_SWAP_API_BASE"
            )
            api_key = api_key or os.environ.get("VLLM_API_KEY") or os.environ.get(
                "LITELLM_CREDENTIAL_LLAMA_SWAP_API_KEY"
            )

            if api_base is None:
                raise ValueError("VLLM_API_BASE is not set")

            headers = {}
            if api_key:
                headers["Authorization"] = f"Bearer {api_key}"
                headers["x-api-key"] = api_key

            response = litellm.module_level_client.get(
                url=_add_path_to_api_base(api_base, "/v1/models"),
                headers=headers,
            )
            response.raise_for_status()

            return [model["id"] for model in response.json().get("data", [])]

        VLLMModelInfo.get_models = get_models
        litellm.models_by_provider.setdefault("hosted_vllm", [])


    def worker_startup_hook():
        patch_vllm_model_discovery()
