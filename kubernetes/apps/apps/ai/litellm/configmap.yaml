apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai
data:
  config.yaml: |
    model_list:
      - model_name: openai/gpt-5.5
        model_info:
          mode: responses
          max_input_tokens: 272000
        litellm_params:
          model: chatgpt/gpt-5.5
          # Synthetic OpenAI API-equivalent Standard pricing, in USD/token.
          input_cost_per_token: 0.000005
          output_cost_per_token: 0.00003

      - model_name: openai/gpt-5.4
        model_info:
          mode: responses
          max_input_tokens: 272000
        litellm_params:
          model: chatgpt/gpt-5.4
          # Synthetic OpenAI API-equivalent Standard pricing, in USD/token.
          input_cost_per_token: 0.0000025
          output_cost_per_token: 0.000015

      - model_name: openai/gpt-5.4-mini
        model_info:
          mode: responses
          max_input_tokens: 272000
        litellm_params:
          model: chatgpt/gpt-5.4-mini
          # Synthetic OpenAI API-equivalent Standard pricing, in USD/token.
          input_cost_per_token: 0.00000075
          output_cost_per_token: 0.0000045

      - model_name: openai/gpt-5.3-codex
        model_info:
          mode: responses
          max_input_tokens: 272000
        litellm_params:
          model: chatgpt/gpt-5.3-codex
          # Synthetic OpenAI API-equivalent Standard pricing, in USD/token.
          input_cost_per_token: 0.00000175
          output_cost_per_token: 0.000014

      - model_name: openai/gpt-5.3-codex-spark
        model_info:
          mode: responses
          max_input_tokens: 272000
        litellm_params:
          model: chatgpt/gpt-5.3-codex-spark
          # Priced as gpt-5.3-codex; OpenAI does not list a separate Spark API rate.
          input_cost_per_token: 0.00000175
          output_cost_per_token: 0.000014

      - model_name: openai/chatterbox
        model_info:
          mode: audio_speech
          health_check_voice: Abigail.wav
        litellm_params:
          model: openai/chatterbox
          custom_llm_provider: openai
          litellm_credential_name: llama-swap
          input_cost_per_token: 0.0
          output_cost_per_token: 0.0
          tags:
            - llama-swap

      - model_name: hosted_vllm/*
        model_info:
          mode: chat
          health_check_model: unsloth/qwen3-4b-instruct-2507
        litellm_params:
          model: hosted_vllm/*
          custom_llm_provider: hosted_vllm
          litellm_credential_name: llama-swap
          input_cost_per_token: 0.0
          output_cost_per_token: 0.0
          tags:
            - llama-swap
            - pve3
          guardrails: []

      - model_name: openrouter/*
        model_info:
          mode: chat
        litellm_params:
          model: openrouter/*
          custom_llm_provider: openrouter
          litellm_credential_name: openrouter
          input_cost_per_token: 0.0
          output_cost_per_token: 0.0

    credential_list:
      - credential_name: llama-swap
        credential_values:
          api_base: os.environ/LITELLM_CREDENTIAL_LLAMA_SWAP_API_BASE
          api_key: os.environ/LITELLM_CREDENTIAL_LLAMA_SWAP_API_KEY
        credential_info:
          custom_llm_provider: openai

      - credential_name: openrouter
        credential_values:
          api_key: os.environ/LITELLM_CREDENTIAL_OPENROUTER_API_KEY
        credential_info:
          custom_llm_provider: openrouter

    litellm_settings:
      callbacks:
        - cache_bypass.proxy_handler_instance
      check_provider_endpoint: true
      cache: true
      cache_params:
        type: redis
        host: litellm-valkey
        port: "6379"
        ssl: false
        ssl_check_hostname: false

    general_settings:
      store_model_in_db: true

    router_settings:
      routing_strategy: simple-shuffle
      num_retries: 2
      timeout: 6000
      max_fallbacks: 5
      allowed_fails: 3
      cooldown_time: 5
      retry_after: 0
      enable_pre_call_checks: false
      model_group_alias:
        openrouter/free: openrouter/openrouter/free
        local/tts: openai/chatterbox
        local/rerank: hosted_vllm/qwen3-reranker-0.6b
        local/stt-fast: hosted_vllm/whisper/large-v3-turbo-q5_0
        local/embedding: hosted_vllm/qwen3-embedding-0.6b
        local/stt-large: hosted_vllm/whisper/large-v3-q5_0
        local/automation-lite: hosted_vllm/unsloth/qwen3-4b-instruct-2507
        local/document-analysis: hosted_vllm/unsloth/qwen3-vl-30b-a3b-instruct
        chatgpt/latest: openai/gpt-5.5

  cache_bypass.py: |
    import json
    from typing import Literal

    from litellm.integrations.custom_logger import CustomLogger
    from litellm.proxy.proxy_server import DualCache, UserAPIKeyAuth


    class CacheBypassHandler(CustomLogger):
        async def async_pre_call_hook(
            self,
            user_api_key_dict: UserAPIKeyAuth,
            cache: DualCache,
            data: dict,
            call_type: Literal[
                "completion",
                "text_completion",
                "embeddings",
                "image_generation",
                "moderation",
                "audio_transcription",
            ],
        ):
            metadata = getattr(user_api_key_dict, "metadata", {}) or {}

            if isinstance(metadata, str):
                try:
                    metadata = json.loads(metadata)
                except json.JSONDecodeError:
                    metadata = {}

            if not isinstance(metadata, dict):
                metadata = {}

            if metadata.get("bypass_redis_cache") is True:
                cache_controls = data.setdefault("cache", {})
                cache_controls["no-cache"] = True
                cache_controls["no-store"] = True

            return data


    proxy_handler_instance = CacheBypassHandler()

  vllm_model_discovery.py: |
    import os

    import litellm
    from litellm.llms.vllm.common_utils import VLLMModelInfo
    from litellm.utils import _add_path_to_api_base


    def patch_vllm_model_discovery():
        def get_models(self, api_key=None, api_base=None):
            api_base = api_base or os.environ.get("VLLM_API_BASE") or os.environ.get(
                "LITELLM_CREDENTIAL_LLAMA_SWAP_API_BASE"
            )
            api_key = api_key or os.environ.get("VLLM_API_KEY") or os.environ.get(
                "LITELLM_CREDENTIAL_LLAMA_SWAP_API_KEY"
            )

            if api_base is None:
                raise ValueError("VLLM_API_BASE is not set")

            headers = {}
            if api_key:
                headers["Authorization"] = f"Bearer {api_key}"
                headers["x-api-key"] = api_key

            response = litellm.module_level_client.get(
                url=_add_path_to_api_base(api_base, "/v1/models"),
                headers=headers,
            )
            response.raise_for_status()

            return [model["id"] for model in response.json().get("data", [])]

        VLLMModelInfo.get_models = get_models
        litellm.models_by_provider.setdefault("hosted_vllm", [])


    def worker_startup_hook():
        patch_vllm_model_discovery()
