apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai
data:
  config.yaml: |
    # ChatGPT subscription models are disabled until LiteLLM fixes empty
    # responses output for chatgpt/* models. Track upstream issue #25429.
    model_list:
      - model_name: openai/chatterbox
        model_info:
          mode: audio_speech
        litellm_params:
          model: openai/chatterbox
          custom_llm_provider: openai
          litellm_credential_name: llama-swap
          input_cost_per_token: 0.0
          output_cost_per_token: 0.0
          tags:
            - llama-swap

      - model_name: hosted_vllm/*
        model_info:
          mode: chat
          health_check_model: unsloth/qwen3-4b-instruct-2507
        litellm_params:
          model: hosted_vllm/*
          custom_llm_provider: hosted_vllm
          litellm_credential_name: llama-swap
          input_cost_per_token: 0.0
          output_cost_per_token: 0.0
          tags:
            - llama-swap
            - pve3
          guardrails: []

      - model_name: openrouter/*
        model_info:
          mode: chat
        litellm_params:
          model: openrouter/*
          custom_llm_provider: openrouter
          litellm_credential_name: openrouter
          input_cost_per_token: 0.0
          output_cost_per_token: 0.0

    credential_list:
      - credential_name: llama-swap
        credential_values:
          api_base: os.environ/LITELLM_CREDENTIAL_LLAMA_SWAP_API_BASE
          api_key: os.environ/LITELLM_CREDENTIAL_LLAMA_SWAP_API_KEY
        credential_info:
          custom_llm_provider: openai

      - credential_name: openrouter
        credential_values:
          api_key: os.environ/LITELLM_CREDENTIAL_OPENROUTER_API_KEY
        credential_info:
          custom_llm_provider: openrouter

    litellm_settings:
      cache: true
      cache_params:
        type: redis
        host: litellm-valkey
        port: "6379"
        ssl: false
        ssl_check_hostname: false

    general_settings:
      store_model_in_db: true

    router_settings:
      routing_strategy: simple-shuffle
      num_retries: 2
      timeout: 6000
      max_fallbacks: 5
      allowed_fails: 3
      cooldown_time: 5
      retry_after: 0
      enable_pre_call_checks: false
      model_group_alias:
        openrouter/free: openrouter/openrouter/free
        local/tts: openai/chatterbox
        local/rerank: hosted_vllm/qwen3-reranker-0.6b
        local/stt-fast: hosted_vllm/whisper/large-v3-turbo-q5_0
        local/embedding: hosted_vllm/qwen3-embedding-0.6b
        local/stt-large: hosted_vllm/whisper/large-v3-q5_0
        local/automation-lite: hosted_vllm/unsloth/qwen3-4b-instruct-2507
        local/document-analysis: hosted_vllm/unsloth/qwen3-vl-30b-a3b-instruct
