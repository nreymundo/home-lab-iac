apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
  namespace: ai
spec:
  chart:
    spec:
      chart: app-template
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          install-headroom:
            image:
              # renovate: datasource=docker depName=berriai/litellm registryUrl=https://ghcr.io
              repository: ghcr.io/berriai/litellm
              tag: v1.93.0
            command:
              - /bin/sh
              - -lc
              - |
                set -euo pipefail
                python3 - <<'PY'
                import time
                import urllib.request

                urls = [
                    "https://pypi.org/simple/headroom-ai/",
                    "https://files.pythonhosted.org/",
                ]

                for url in urls:
                    last_error = None
                    for attempt in range(1, 6):
                        try:
                            with urllib.request.urlopen(url, timeout=10) as response:
                                if 200 <= response.status < 400:
                                    break
                                last_error = RuntimeError(f"unexpected status {response.status}")
                        except Exception as exc:
                            last_error = exc
                        if attempt == 5:
                            raise SystemExit(f"PyPI endpoint unavailable: {url}: {last_error}")
                        time.sleep(attempt * 2)
                PY
                python3 -m ensurepip --default-pip >/dev/null
                python3 -m pip install \
                  --no-cache-dir \
                  --no-deps \
                  --only-binary=:all: \
                  --require-hashes \
                  --retries 5 \
                  --timeout 30 \
                  --target /opt/headroom \
                  -r /etc/litellm/headroom-requirements.txt
                PYTHONPATH=/opt/headroom:/etc/litellm python3 - <<'PY'
                import asyncio

                from headroom.integrations.litellm_callback import HeadroomCallback
                import headroom_adapter

                callback = HeadroomCallback()
                assert callback is not None

                async def main():
                    data = {
                        "model": "test-model",
                        "messages": [{"role": "user", "content": "hello"}],
                    }
                    result = await headroom_adapter.headroom_callback_instance.async_pre_call_hook(
                        None,
                        None,
                        data,
                        "completion",
                    )
                    assert isinstance(result, dict)

                asyncio.run(main())
                PY
        containers:
          main:
            image:
              # renovate: datasource=docker depName=berriai/litellm registryUrl=https://ghcr.io
              repository: ghcr.io/berriai/litellm
              tag: v1.93.0
            env:
              TZ: Europe/Berlin
              PYTHONPATH: /opt/headroom:/etc/litellm
              LITELLM_WORKER_STARTUP_HOOKS: litellm_startup:worker_startup_hook
              STORE_MODEL_IN_DB: "True"
              CONFIG_FILE_PATH: /etc/litellm/config.yaml
              CHATGPT_TOKEN_DIR: /var/lib/litellm/chatgpt
              CHATGPT_AUTH_FILE: auth.json
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: litellm-db-secrets
                    key: DATABASE_URL
              LITELLM_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secrets
                    key: LITELLM_MASTER_KEY
              LITELLM_SALT_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secrets
                    key: LITELLM_SALT_KEY
              GENERIC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: litellm-sso-secret
                    key: CLIENT_ID
              GENERIC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: litellm-sso-secret
                    key: CLIENT_SECRET
              GENERIC_AUTHORIZATION_ENDPOINT: https://sso.${CLUSTER_DOMAIN}/application/o/authorize/
              GENERIC_TOKEN_ENDPOINT: https://sso.${CLUSTER_DOMAIN}/application/o/token/
              GENERIC_USERINFO_ENDPOINT: https://sso.${CLUSTER_DOMAIN}/application/o/userinfo/
              GENERIC_SCOPE: "openid profile email litellm"
              GENERIC_USER_ROLE_ATTRIBUTE: litellm_role
              PROXY_BASE_URL: https://litellm.lan.${CLUSTER_DOMAIN}
              AUTO_REDIRECT_UI_LOGIN_TO_SSO: "true"
              REDIS_URL: redis://litellm-valkey:6379
              SET_DEBUG: "True"
            envFrom:
              - secretRef:
                  name: litellm-credentials
            ports:
              - name: http
                containerPort: 4000
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/liveliness
                    port: 4000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/readiness
                    port: 4000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/liveliness
                    port: 4000
                  failureThreshold: 60
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 2Gi

      valkey:
        containers:
          valkey:
            image:
              # renovate: datasource=docker depName=valkey/valkey registryUrl=https://docker.io
              repository: docker.io/valkey/valkey
              tag: 9-alpine
            command:
              - valkey-server
              - --save
              - ""
              - --appendonly
              - "no"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - redis-cli ping || exit 1
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - redis-cli ping || exit 1
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 250m
                memory: 256Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: 4000
      valkey:
        controller: valkey
        ports:
          valkey:
            port: 6379

    ingress:
      main:
        annotations:
          external-dns.alpha.kubernetes.io/hostname: litellm.lan.${CLUSTER_DOMAIN}
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: LiteLLM
          gethomepage.dev/description: LLM gateway
          gethomepage.dev/group: "Kubernetes"
          gethomepage.dev/icon: litlellm.png
          gethomepage.dev/href: https://litellm.lan.${CLUSTER_DOMAIN}/ui
        hosts:
          - host: litellm.lan.${CLUSTER_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: main
                  port: http

    persistence:
      data:
        enabled: true
        type: custom
        volumeSpec:
          persistentVolumeClaim:
            claimName: litellm
        advancedMounts:
          main:
            main:
              - path: /var/lib/litellm
      valkey-data:
        enabled: true
        type: emptyDir
        advancedMounts:
          valkey:
            valkey:
              - path: /data
      headroom-site:
        enabled: true
        type: emptyDir
        advancedMounts:
          main:
            install-headroom:
              - path: /opt/headroom
            main:
              - path: /opt/headroom
      config:
        enabled: true
        type: configMap
        name: litellm-config
        advancedMounts:
          main:
            install-headroom:
              - path: /etc/litellm/headroom-requirements.txt
                subPath: headroom-requirements.txt
                readOnly: true
              - path: /etc/litellm/headroom_adapter.py
                subPath: headroom_adapter.py
                readOnly: true
            main:
              - path: /etc/litellm/config.yaml
                subPath: config.yaml
                readOnly: true
              - path: /etc/litellm/cache_bypass.py
                subPath: cache_bypass.py
                readOnly: true
              - path: /etc/litellm/vllm_model_discovery.py
                subPath: vllm_model_discovery.py
                readOnly: true
              - path: /etc/litellm/chatgpt_responses_streaming_patch.py
                subPath: chatgpt_responses_streaming_patch.py
                readOnly: true
              - path: /etc/litellm/chatgpt_codex_catalog.py
                subPath: chatgpt_codex_catalog.py
                readOnly: true
              - path: /etc/litellm/zai_coding_catalog.py
                subPath: zai_coding_catalog.py
                readOnly: true
              - path: /etc/litellm/litellm_startup.py
                subPath: litellm_startup.py
                readOnly: true
              - path: /etc/litellm/sitecustomize.py
                subPath: sitecustomize.py
                readOnly: true
              - path: /etc/litellm/headroom_adapter.py
                subPath: headroom_adapter.py
                readOnly: true
              - path: /etc/litellm/headroom-requirements.txt
                subPath: headroom-requirements.txt
                readOnly: true
