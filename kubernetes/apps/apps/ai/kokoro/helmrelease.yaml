apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kokoro
  namespace: ai
spec:
  chart:
    spec:
      chart: app-template
  values:
    controllers:
      main:
        pod:
          nodeSelector:
            topology.kubernetes.io/zone: "framework"
        containers:
          main:
            image:
              # renovate: datasource=docker depName=remsky/kokoro-fastapi-cpu registryUrl=https://ghcr.io
              repository: ghcr.io/remsky/kokoro-fastapi-cpu
              tag: v0.2.4
            env:
              TZ: Europe/Berlin
              MODEL_DIR: /data/models
              VOICES_DIR: /data/voices
              DOWNLOAD_MODEL: true
            ports:
              - name: http
                containerPort: 8880
    service:
      main:
        controller: main
        ports:
          http:
            port: 8880
    ingress:
      main:
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: traefik-lan-allowlist@kubernetescrd
          external-dns.alpha.kubernetes.io/hostname: kokoro.lan.${CLUSTER_DOMAIN}
          gethomepage.dev/name: Kokoro
          gethomepage.dev/description: Text-to-speech API
          gethomepage.dev/group: AI
          gethomepage.dev/icon: kokoro-web.png
          gethomepage.dev/enabled: "true"
          gethomepage.dev/pod-selector: app.kubernetes.io/name=kokoro,app.kubernetes.io/instance=kokoro
          gethomepage.dev/href: https://kokoro.lan.${CLUSTER_DOMAIN}/web
        hosts:
          - host: kokoro.lan.${CLUSTER_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: main
                  port: http
      web:
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: traefik-gatekeeper-auth-chain@kubernetescrd
        hosts:
          - host: kokoro.lan.${CLUSTER_DOMAIN}
            paths:
              - path: /web
                service:
                  identifier: main
                  port: http
              - path: /docs
                service:
                  identifier: main
                  port: http
    persistence:
      data:
        enabled: true
        type: hostPath
        hostPath: /opt/kokoro
        hostPathType: DirectoryOrCreate
        globalMounts:
          - path: /data
