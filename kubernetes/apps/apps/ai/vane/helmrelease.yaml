apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vane
  namespace: ai
spec:
  chart:
    spec:
      chart: app-template
  values:
    defaultPodOptions:
      labels:
        observability_multiline_profile: level_prefix

    controllers:
      main:
        replicas: 0
        containers:
          main:
            image:
              # renovate: datasource=docker depName=itzcrazykns1337/vane registryUrl=https://docker.io
              repository: docker.io/itzcrazykns1337/vane
              tag: v1.12.2
            env:
              TZ: Europe/Berlin
            ports:
              - name: http
                containerPort: 3000
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 2
                memory: 2Gi
    service:
      main:
        controller: main
        ports:
          http:
            port: 3000
    ingress:
      main:
        annotations:
          external-dns.alpha.kubernetes.io/hostname: vane.lan.${CLUSTER_DOMAIN}
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Vane
          gethomepage.dev/description: AI search assistant
          gethomepage.dev/icon: "https://i.imgur.com/9E2W5BY.png"
          gethomepage.dev/group: "Apps/Services"
        hosts:
          - host: vane.lan.${CLUSTER_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: main
                  port: http
    persistence:
      data:
        enabled: true
        type: custom
        volumeSpec:
          persistentVolumeClaim:
            claimName: vane
        globalMounts:
          - path: /home/vane/data
