apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: dawarich-pg
  namespace: utils
  labels:
    release: observability-kube-prometheus-stack
spec:
  inheritedMetadata:
    labels:
      recurring-job.longhorn.io/backup-daily: enabled
      recurring-job.longhorn.io/backup-weekly: enabled
  instances: 1
  monitoring:
    enablePodMonitor: true
  storage:
    size: 20Gi
    storageClass: longhorn-r2

  imageName: ghcr.io/cloudnative-pg/postgis:17.10-3.6.3-202606151233-standard-trixie@sha256:2b06fd2e4caef7364f46b1378e4c79794a171e0c1d2ad22ecdccc94438a2daf4

  postgresql:
    parameters:
      wal_level: "replica"
      archive_timeout: "21600" # Wait 6 hours before shipping WALs when no activity
      archive_mode: "on"

  bootstrap:
    initdb:
      database: dawarich
      owner: dawarich
      secret:
        name: dawarich-db-secrets
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS postgis;

  backup:
    barmanObjectStore:
      wal:
        compression: gzip
      data:
        compression: gzip

      s3Credentials:
        accessKeyId:
          name: cnpg-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-s3
          key: ACCESS_SECRET_KEY
        region:
          name: cnpg-backup-s3
          key: AWS_DEFAULT_REGION
      destinationPath: "s3://cloudnative-pg/dawarich"
      endpointURL: "https://s3.${CLUSTER_DOMAIN}"
      serverName: "dawarich-pg-v1"
    retentionPolicy: "14d"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: dawarich-pg-backup
  namespace: utils
spec:
  schedule: "0 0 0 * * *"  # Daily at midnight
  backupOwnerReference: self
  cluster:
    name: dawarich-pg
  method: barmanObjectStore
