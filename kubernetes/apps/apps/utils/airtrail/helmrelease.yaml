apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airtrail
  namespace: utils
spec:
  chart:
    spec:
      chart: app-template
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsUser: 1000
        runAsGroup: 1000

    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              # renovate: datasource=docker depName=johly/airtrail registryUrl=https://docker.io
              repository: docker.io/johly/airtrail
              tag: v3.11.1
            env:
              TZ: Europe/Berlin
              NODE_ENV: production
              HOST: 0.0.0.0
              PORT: "3000"
              ORIGIN: https://airtrail.lan.${CLUSTER_DOMAIN}
              UPLOAD_LOCATION: /app/uploads
              DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: airtrail-db-secrets
                    key: DB_URL
              INTEGRATIONS_AERO_DATA_BOX_KEY:
                valueFrom:
                  secretKeyRef:
                    name: airtrail-integration-secrets
                    key: INTEGRATIONS_AERO_DATA_BOX_KEY
              INTEGRATIONS_OPEN_AIP_KEY:
                valueFrom:
                  secretKeyRef:
                    name: airtrail-integration-secrets
                    key: INTEGRATIONS_OPEN_AIP_KEY
              OAUTH_ENABLED: "true"
              OAUTH_ISSUER_URL: https://sso.${CLUSTER_DOMAIN}/application/o/airtrail/
              OAUTH_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: airtrail-oidc-secrets
                    key: OAUTH_CLIENT_ID
              OAUTH_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: airtrail-oidc-secrets
                    key: OAUTH_CLIENT_SECRET
              OAUTH_TOKEN_ENDPOINT_AUTH_METHOD: client_secret_post
              OAUTH_SCOPE: openid profile email
              OAUTH_AUTO_REGISTER: "true"
              OAUTH_AUTO_LOGIN: "true"
              OAUTH_HIDE_PASSWORD_FORM: "true"
              OAUTH_BUTTON_TEXT: Log in with Authentik
            ports:
              - name: http
                containerPort: 3000
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/ping
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/ping
                    port: 3000
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/ping
                    port: 3000
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 60
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 2000m
                memory: 2Gi

    service:
      main:
        controller: main
        ports:
          http:
            port: 3000

    ingress:
      main:
        annotations:
          external-dns.alpha.kubernetes.io/hostname: airtrail.lan.${CLUSTER_DOMAIN}
        hosts:
          - host: airtrail.lan.${CLUSTER_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: main
                  port: http

    persistence:
      uploads:
        enabled: true
        type: custom
        volumeSpec:
          persistentVolumeClaim:
            claimName: airtrail
        globalMounts:
          - path: /app/uploads
