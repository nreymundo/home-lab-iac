apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: airtrail-pg
  namespace: utils
  labels:
    release: observability-kube-prometheus-stack
spec:
  inheritedMetadata:
    labels:
      recurring-job.longhorn.io/backup-daily: enabled
      recurring-job.longhorn.io/backup-weekly: enabled
  instances: 1
  monitoring:
    enablePodMonitor: true
  storage:
    size: 5Gi
    storageClass: longhorn-r2

  imageName: ghcr.io/cloudnative-pg/postgresql:16

  postgresql:
    parameters:
      wal_level: "replica"
      archive_timeout: "21600" # Wait 6 hours before shipping WALs when no activity
      archive_mode: "on"

  bootstrap:
    initdb:
      database: airtrail
      owner: airtrail
      secret:
        name: airtrail-db-secrets
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS unaccent;

  backup:
    barmanObjectStore:
      wal:
        compression: gzip
      data:
        compression: gzip

      s3Credentials:
        accessKeyId:
          name: cnpg-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-s3
          key: ACCESS_SECRET_KEY
        region:
          name: cnpg-backup-s3
          key: AWS_DEFAULT_REGION
      destinationPath: "s3://cloudnative-pg/airtrail"
      endpointURL: "https://s3.${CLUSTER_DOMAIN}"
      serverName: "airtrail-pg-v1"
    retentionPolicy: "14d"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: airtrail-pg-backup
  namespace: utils
spec:
  schedule: "0 0 0 * * *"  # Daily at midnight
  backupOwnerReference: self
  cluster:
    name: airtrail-pg
  method: barmanObjectStore
