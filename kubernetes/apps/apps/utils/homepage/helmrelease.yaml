      widgets:
        # - resources:
        #     # change backend to 'kubernetes' to use Kubernetes integration. Requires RBAC.
        #     backend: kubernetes
        #     expanded: true
        #     cpu: true
        #     memory: true
        - search:
            provider: custom
            url: https://search.lan.${CLUSTER_DOMAIN}/search?q=
            target: _self
        - longhorn:
            expanded: true
            total: true
            labels: true
            nodes: false
        - openmeteo:
            label: Berlin
            latitude: "{{HOMEPAGE_VAR_WEATHER_LATITUDE}}"
            longitude: "{{HOMEPAGE_VAR_WEATHER_LONGITUDE}}"
            timezone: Europe/Berlin
            units: metric
            cache: 5
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: "cluster"
            nodes:
              show: false
              cpu: true
              memory: true
              showLabel: true
      kubernetes:
        mode: cluster
        ingress: false
        traefik: false
        gateway: false
      docker:
      settings:

      # all sections can alternately be appended with "String" such as this example settings. This is useful
      # for defining a stable ordering. Unfortunately Go's (and therefore Helm's) toYaml function sorts keys
      # and loses and input ordering. Using a string is the best way around this.
      settingsString: |
        title: Homepage
        headerStyle: boxed
        target: _self
        hideVersion: true
        statusStyle: dot
        useEqualHeights: true
        background:
          image: https://i.imgur.com/s2BDTA0.jpeg
        cardBlur: xl
        theme: dark

        providers:
          longhorn:
            url: http://longhorn-frontend.longhorn-system.svc.cluster.local

        layout:
          Local Services:
            style: row
            columns: 5
          Kubernetes:
            style: row
            columns: 5

    # -- Main environment variables. Template enabled.
    # Syntax options:
    # A) TZ: UTC
    # B) PASSWD: '{{ .Release.Name }}'
    # C) PASSWD:
    #      configMapKeyRef:
    #        name: config-map-name
    #        key: key-name
    # D) PASSWD:
    #      valueFrom:
    #        secretKeyRef:
    #          name: secret-name
    #          key: key-name
    #      ...
    # E) - name: TZ
    #      value: UTC
    # F) - name: TZ
    #      value: '{{ .Release.Name }}'
    env:
      - name: HOMEPAGE_ALLOWED_HOSTS
        # This value must be set
        # ref: https://gethomepage.dev/installation/#homepage_allowed_hosts
        value: start.lan.${CLUSTER_DOMAIN}
      - name: TZ
        value: Europe/Berlin

    envFrom:
      - secretRef:
          name: homepage-secrets

    # To include environment variables from other configs or other secrets for use in
    # Homepage's variable substitutions. Refer to them here.
    # envFrom:
    #   - secretRef:
    #       name: my-secret
    #   - configMapRef:
    #       name: my-configmap

    persistence:
      logs:
        enabled: true
        type: emptyDir
        mountPath: /app/config/logs

    resources:
      requests:
        memory: 64Mi
        cpu: 25m
      limits:
        memory: 256Mi
        cpu: 250m
