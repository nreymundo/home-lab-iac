apiVersion: v1
kind: Service
metadata:
  name: bambuddy-virtual-printer
  namespace: utils
spec:
  type: LoadBalancer
  loadBalancerIP: ${BAMBUDDY_LB_IP}
  loadBalancerSourceRanges:
    - 192.168.0.0/16
  selector:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: bambuddy
    app.kubernetes.io/name: bambuddy
  ports:
    - name: vp-bind-3000
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: vp-bind-3002
      port: 3002
      targetPort: 3002
      protocol: TCP
    - name: mqtt
      port: 8883
      targetPort: 8883
      protocol: TCP
    - name: ftps
      port: 990
      targetPort: 990
      protocol: TCP
    - name: tunnel
      port: 6000
      targetPort: 6000
      protocol: TCP
    - name: rtsp
      port: 322
      targetPort: 322
      protocol: TCP
    - name: vp-2024
      port: 2024
      targetPort: 2024
      protocol: TCP
    - name: vp-2025
      port: 2025
      targetPort: 2025
      protocol: TCP
    - name: vp-2026
      port: 2026
      targetPort: 2026
      protocol: TCP
