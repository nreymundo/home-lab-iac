apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bambuddy
  namespace: utils
spec:
  chart:
    spec:
      chart: app-template
  values:
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              # renovate: datasource=docker depName=maziggy/bambuddy registryUrl=https://ghcr.io
              repository: ghcr.io/maziggy/bambuddy
              tag: 0.2.4.5
            env:
              TZ: Europe/Berlin
              PUID: "1000"
              PGID: "1000"
              PORT: "8000"
              VIRTUAL_PRINTER_PASV_ADDRESS: ${BAMBUDDY_LB_IP}
            securityContext:
              capabilities:
                add:
                  - NET_BIND_SERVICE
            ports:
              - name: http
                containerPort: 8000
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: "2"
                memory: 2Gi
    service:
      main:
        controller: main
        ports:
          http:
            port: 8000
    ingress:
      main:
        annotations:
          external-dns.alpha.kubernetes.io/hostname: bambuddy.lan.${CLUSTER_DOMAIN}
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Bambuddy
          gethomepage.dev/description: Bambu Lab printer command center
          gethomepage.dev/group: "Kubernetes"
          gethomepage.dev/icon: bambu-lab.png
        hosts:
          - host: bambuddy.lan.${CLUSTER_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: main
                  port: http
    persistence:
      data:
        enabled: true
        type: custom
        volumeSpec:
          persistentVolumeClaim:
            claimName: bambuddy-data
        globalMounts:
          - path: /app/data
      logs:
        enabled: true
        type: custom
        volumeSpec:
          persistentVolumeClaim:
            claimName: bambuddy-logs
        globalMounts:
          - path: /app/logs
