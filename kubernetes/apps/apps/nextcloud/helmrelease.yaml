apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  chart:
    spec:
      chart: app-template
  values:
    controllers:
      collabora:
        containers:
          collabora:
            image:
              # renovate: datasource=docker depName=collabora/code registryUrl=https://docker.io
              repository: docker.io/collabora/code
              tag: 25.04.9.4.1
            env:
              TZ: Europe/Berlin
              dictionaries: "en_US de_DE es_AR"
              server_name: office.${CLUSTER_DOMAIN}
              aliasgroup1: https://cloud.${CLUSTER_DOMAIN}
              extra_params: --o:ssl.enable=false --o:ssl.termination=true --o:welcome.enable=false --o:remote_font_config.url=https://cloud.${CLUSTER_DOMAIN}/apps/richdocuments/settings/fonts.json --o:net.content_security_policy.frame_ancestors=https://cloud.${CLUSTER_DOMAIN} --o:home_mode.enable=true
            securityContext:
              allowPrivilegeEscalation: true
              capabilities:
                add:
                  - MKNOD
                  - SYS_CHROOT
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: 2
                memory: 2Gi
            ports:
              - name: http
                containerPort: 9980
      main:
        containers:
          main:
            image:
              # renovate: datasource=docker depName=linuxserver/nextcloud registryUrl=https://lscr.io
              repository: lscr.io/linuxserver/nextcloud
              tag: 33.0.2
            env:
              TZ: Europe/Berlin
              PUID: "1000"
              PGID: "1000"
            ports:
              - name: https
                containerPort: 443
          log-tailer:
            image:
              repository: docker.io/busybox
              tag: latest
            command:
              - /bin/sh
              - -c
              - "tail -n 1 -F /data/nextcloud.log"
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                cpu: 50m
                memory: 32Mi
      valkey:
        containers:
          valkey:
            image:
              # renovate: datasource=docker depName=valkey/valkey registryUrl=https://docker.io
              repository: docker.io/valkey/valkey
              tag: 9-alpine
            command:
              - valkey-server
              - --save
              - "30"
              - "1"
              - --loglevel
              - warning
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 250m
                memory: 256Mi
      clamav:
        containers:
          clamav:
            image:
              # renovate: datasource=docker depName=clamav/clamav registryUrl=https://docker.io
              repository: docker.io/clamav/clamav
              tag: "1.5"
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 2Gi
    service:
      collabora:
        controller: collabora
        ports:
          http:
            port: 9980
      main:
        controller: main
        annotations:
          traefik.ingress.kubernetes.io/service.serversscheme: https
          traefik.ingress.kubernetes.io/service.serverstransport: traefik-lan-https-insecure@kubernetescrd
        ports:
          https:
            port: 443
      valkey:
        controller: valkey
        ports:
          valkey:
            port: 6379
      clamav:
        controller: clamav
        ports:
          clamav:
            port: 3310
    ingress:
      collabora:
        annotations:
          external-dns.alpha.kubernetes.io/hostname: office.${CLUSTER_DOMAIN}
          traefik.ingress.kubernetes.io/router.middlewares: traefik-nextcloud-office-chain@kubernetescrd
        hosts:
          - host: office.${CLUSTER_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: collabora
                  port: http
      main:
        annotations:
          external-dns.alpha.kubernetes.io/hostname: cloud.${CLUSTER_DOMAIN}
          traefik.ingress.kubernetes.io/router.middlewares: traefik-nextcloud-office-chain@kubernetescrd
          gethomepage.dev/name: Nextcloud
          gethomepage.dev/description: File sync and share
          gethomepage.dev/group: Utils
          gethomepage.dev/icon: nextcloud.png
          gethomepage.dev/enabled: "true"
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=nextcloud,app.kubernetes.io/instance=nextcloud,app.kubernetes.io/controller=main"
          gethomepage.dev/href: https://cloud.${CLUSTER_DOMAIN}
        hosts:
          - host: cloud.${CLUSTER_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: main
                  port: https
    persistence:
      config:
        enabled: true
        type: custom
        volumeSpec:
          persistentVolumeClaim:
            claimName: nextcloud-config
        advancedMounts:
          main:
            main:
              - path: /config
      data:
        enabled: true
        type: custom
        volumeSpec:
          persistentVolumeClaim:
            claimName: nextcloud-data
        advancedMounts:
          main:
            main:
              - path: /data
            log-tailer:
              - path: /data
                readOnly: true
      valkey-data:
        enabled: true
        type: emptyDir
        advancedMounts:
          valkey:
            valkey:
              - path: /data
      clamav-data:
        enabled: true
        type: emptyDir
        advancedMounts:
          clamav:
            clamav:
              - path: /var/lib/clamav
