apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  chart:
    spec:
      chart: app-template
  values:
    controllers:
      main:
        pod:
          nodeSelector:
            topology.kubernetes.io/zone: "framework"
        containers:
          main:
            image:
              # renovate: datasource=docker depName=linuxserver/nextcloud registryUrl=https://lscr.io
              repository: lscr.io/linuxserver/nextcloud
              tag: 33.0.0
            env:
              NEXTCLOUD_ADMIN_USER:
                valueFrom:
                  secretKeyRef:
                    name: nextcloud-admin-secrets
                    key: username
              NEXTCLOUD_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: nextcloud-admin-secrets
                    key: password
              POSTGRES_DB: nextcloud
              POSTGRES_HOST: nextcloud-pg-rw
              REDIS_HOST: nextcloud-valkey
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: nextcloud-db-secrets
                    key: username
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: nextcloud-db-secrets
                    key: password
              TZ: Europe/Berlin
              PUID: "1000"
              PGID: "1000"
            ports:
              - name: https
                containerPort: 443
      valkey:
        containers:
          valkey:
            image:
              # renovate: datasource=docker depName=valkey/valkey registryUrl=https://docker.io
              repository: docker.io/valkey/valkey
              tag: 9-alpine
            command:
              - valkey-server
              - --save
              - "30"
              - "1"
              - --loglevel
              - warning
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 250m
                memory: 256Mi
    service:
      main:
        controller: main
        annotations:
          traefik.ingress.kubernetes.io/service.serversscheme: https
          traefik.ingress.kubernetes.io/service.serverstransport: traefik-lan-https-insecure@kubernetescrd
        ports:
          https:
            port: 443
      valkey:
        controller: valkey
        ports:
          valkey:
            port: 6379
    ingress:
      main:
        annotations:
          external-dns.alpha.kubernetes.io/hostname: cloud.${CLUSTER_DOMAIN}
          gethomepage.dev/name: Nextcloud
          gethomepage.dev/description: File sync and share
          gethomepage.dev/group: Utils
          gethomepage.dev/icon: nextcloud.png
          gethomepage.dev/enabled: "true"
          gethomepage.dev/href: https://cloud.${CLUSTER_DOMAIN}
        hosts:
          - host: cloud.${CLUSTER_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: main
                  port: https
    persistence:
      config:
        enabled: true
        type: hostPath
        hostPath: /opt/nextcloud/config
        hostPathType: DirectoryOrCreate
        globalMounts:
          - path: /config
      data:
        enabled: true
        type: hostPath
        hostPath: /opt/nextcloud/data
        hostPathType: DirectoryOrCreate
        globalMounts:
          - path: /data
      valkey-data:
        enabled: true
        type: emptyDir
        advancedMounts:
          valkey:
            valkey:
              - path: /data
