apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nextcloud-pg
  namespace: nextcloud
  labels:
    release: observability-kube-prometheus-stack
spec:
  inheritedMetadata:
    labels:
      recurring-job.longhorn.io/backup-daily: enabled
      recurring-job.longhorn.io/backup-weekly: enabled
  instances: 2
  monitoring:
    enablePodMonitor: true
  storage:
    size: 10Gi
    storageClass: longhorn-r2

  imageName: ghcr.io/cloudnative-pg/postgresql:18

  postgresql:
    parameters:
      wal_level: "replica"
      archive_timeout: "43200"
      archive_mode: "on"

  bootstrap:
    initdb:
      database: nextcloud
      owner: nextcloud
      secret:
        name: nextcloud-db-secrets

  backup:
    barmanObjectStore:
      wal:
        compression: gzip
      data:
        compression: gzip

      s3Credentials:
        accessKeyId:
          name: cnpg-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-s3
          key: ACCESS_SECRET_KEY
        region:
          name: cnpg-backup-s3
          key: AWS_DEFAULT_REGION
      destinationPath: "s3://cloudnative-pg/nextcloud"
      endpointURL: "https://s3.${CLUSTER_DOMAIN}"
      serverName: "nextcloud-pg-v1"
    retentionPolicy: "14d"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: nextcloud-pg-backup
  namespace: nextcloud
spec:
  schedule: "0 0 * * *"
  backupOwnerReference: self
  cluster:
    name: nextcloud-pg
  method: barmanObjectStore
