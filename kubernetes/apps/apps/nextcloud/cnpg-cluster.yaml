apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nextcloud-pg
  namespace: nextcloud
  labels:
    release: observability-kube-prometheus-stack
spec:
  inheritedMetadata:
    labels:
      recurring-job.longhorn.io/source: enabled
      recurring-job.longhorn.io/backup-daily: enabled
      recurring-job.longhorn.io/backup-weekly: enabled
  instances: 1
  monitoring:
    enablePodMonitor: true
  storage:
    size: 10Gi
    storageClass: longhorn-r2

  imageName: ghcr.io/cloudnative-pg/postgresql:18

  postgresql:
    parameters:
      wal_level: "replica"
      archive_timeout: "43200"
      archive_mode: "off"

  bootstrap:
    initdb:
      database: nextcloud
      owner: nextcloud
      secret:
        name: nextcloud-db-secrets
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: nextcloud-pg-backup
  namespace: nextcloud
spec:
  schedule: "0 0 0 * * *"
  suspend: true
  backupOwnerReference: self
  cluster:
    name: nextcloud-pg
  method: barmanObjectStore
