apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opnsense-exporter
  namespace: external-observability
spec:
  chart:
    spec:
      chart: app-template
  values:
    serviceAccount:
      name: ""
      create: true
    controllers:
      main:
        containers:
          main:
            image:
              # renovate: datasource=docker depName=athennamind/opnsense-exporter registryUrl=https://ghcr.io
              repository: ghcr.io/athennamind/opnsense-exporter
              tag: 0.0.14
            args:
              - --opnsense.protocol=http
              - --opnsense.address=192.168.10.1
              - --exporter.instance-label=opnsense
              - --web.listen-address=:8080
            envFrom:
              - secretRef:
                  name: opnsense-exporter-secret
            ports:
              - name: metrics
                containerPort: 8080
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 12
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
    service:
      main:
        controller: main
        ports:
          metrics:
            port: 8080
