apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  chart:
    spec:
      chart: app-template
  values:
    defaultPodOptions:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: k3s-node-02
    controllers:
      main:
        strategy: Recreate
        initContainers:
          configure-transcoding:
            image:
              # renovate: datasource=docker depName=linuxserver/jellyfin registryUrl=https://lscr.io
              repository: lscr.io/linuxserver/jellyfin
              tag: 10.11.11
            securityContext:
              runAsNonRoot: true
              runAsUser: 99
              runAsGroup: 100
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 64Mi
            command:
              - sh
              - -c
              - |
                xmlstarlet ed -L \
                  -u '/EncodingOptions/HardwareAccelerationType' -v vaapi \
                  -u '/EncodingOptions/VaapiDevice' -v /dev/dri/renderD128 \
                  -u '/EncodingOptions/EnableHardwareEncoding' -v true \
                  -u '/EncodingOptions/AllowHevcEncoding' -v true \
                  -d '/EncodingOptions/TranscodingTempPath' \
                  -s '/EncodingOptions' -t elem -n TranscodingTempPath -v /transcode \
                  -d '/EncodingOptions/HardwareDecodingCodecs/string' \
                  -s '/EncodingOptions/HardwareDecodingCodecs' -t elem -n string -v h264 \
                  -s '/EncodingOptions/HardwareDecodingCodecs' -t elem -n string -v hevc \
                  -s '/EncodingOptions/HardwareDecodingCodecs' -t elem -n string -v mpeg2video \
                  -s '/EncodingOptions/HardwareDecodingCodecs' -t elem -n string -v vc1 \
                  -s '/EncodingOptions/HardwareDecodingCodecs' -t elem -n string -v vp8 \
                  -s '/EncodingOptions/HardwareDecodingCodecs' -t elem -n string -v vp9 \
                  -s '/EncodingOptions/HardwareDecodingCodecs' -t elem -n string -v av1 \
                  /config/encoding.xml
        containers:
          main:
            image:
              # renovate: datasource=docker depName=linuxserver/jellyfin registryUrl=https://lscr.io
              repository: lscr.io/linuxserver/jellyfin
              tag: 10.11.11
            env:
              TZ: Europe/Berlin
              LIBVA_DRIVER_NAME: iHD
              # Keep rendered artwork on the persistent Longhorn volume, never the NFS media mount.
              JELLYFIN_CACHE_DIR: /config/cache
              PUID: "99"
              PGID: "100"
            ports:
              - name: http
                containerPort: 8096
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/bash
                      - -c
                      - exec 3<>/dev/tcp/127.0.0.1/8096 && ls /data >/dev/null
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/bash
                      - -c
                      - exec 3<>/dev/tcp/127.0.0.1/8096 && ls /data >/dev/null
                  initialDelaySeconds: 20
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8096
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 30
            resources:
              requests:
                gpu.intel.com/i915: 1
                cpu: 500m
                memory: 1Gi
              limits:
                gpu.intel.com/i915: 1
                cpu: 2000m
                memory: 4Gi
    service:
      main:
        controller: main
        ports:
          http:
            port: 8096
    ingress:
      main:
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: traefik-default-chain@kubernetescrd
          external-dns.alpha.kubernetes.io/hostname: jellyfin.lan.${CLUSTER_DOMAIN}
          gethomepage.dev/name: Jellyfin
          gethomepage.dev/description: Media server
          gethomepage.dev/group: "Kubernetes"
          gethomepage.dev/icon: jellyfin.png
          gethomepage.dev/enabled: "true"
          # gethomepage.dev/widget.type: "jellyfin"
          # gethomepage.dev/widget.url: "http://jellyfin.media.svc.cluster.local:8096"
        hosts:
          - host: jellyfin.lan.${CLUSTER_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: main
                  port: http
    persistence:
      config:
        enabled: true
        type: custom
        volumeSpec:
          persistentVolumeClaim:
            claimName: jellyfin
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: ${UNRAID_IP}
        path: /mnt/user/media
        globalMounts:
          - path: /data
      transcode:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /transcode
