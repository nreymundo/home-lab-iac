apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: plex-exporter
  namespace: media
  labels:
    release: observability-kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: plex-exporter
      app.kubernetes.io/name: plex-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
