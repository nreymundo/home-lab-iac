apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
  namespace: media
spec:
  chart:
    spec:
      chart: app-template
  values:
    controllers:
      main:
        containers:
          main:
            image:
              # renovate: datasource=docker depName=linuxserver/plex registryUrl=https://lscr.io
              repository: lscr.io/linuxserver/plex
              tag: "1.43.0"
            env:
              TZ: Europe/Berlin
              LIBVA_DRIVER_NAME: iHD
              PUID: "99"
              PGID: "100"
              VERSION: docker
            ports:
              - name: http
                containerPort: 32400
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 32400
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 32400
                  initialDelaySeconds: 20
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 32400
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 30
            resources:
              requests:
                gpu.intel.com/i915: 1
                cpu: 500m
                memory: 1Gi
              limits:
                gpu.intel.com/i915: 1
                cpu: 2000m
                memory: 4Gi
    service:
      main:
        controller: main
        ports:
          http:
            port: 32400
    ingress:
      main:
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: traefik-default-chain@kubernetescrd
          external-dns.alpha.kubernetes.io/hostname: plex.lan.${CLUSTER_DOMAIN}
          gethomepage.dev/name: Plex
          gethomepage.dev/description: Media server
          gethomepage.dev/group: Media
          gethomepage.dev/icon: plex.png
          gethomepage.dev/enabled: "true"
        hosts:
          - host: plex.lan.${CLUSTER_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: main
                  port: http
    persistence:
      config:
        enabled: true
        type: custom
        volumeSpec:
          persistentVolumeClaim:
            claimName: plex
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: ${UNRAID_IP}
        path: /mnt/user/media
        globalMounts:
          - path: /mnt/smb/unraid/media
      transcode:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /transcode
