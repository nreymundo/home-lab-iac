apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin-exporter
  namespace: media
spec:
  chart:
    spec:
      chart: app-template
  values:
    controllers:
      main:
        containers:
          main:
            image:
              # renovate: datasource=docker depName=rebelcore/jellyfin-exporter registryUrl=https://registry-1.docker.io
              repository: docker.io/rebelcore/jellyfin-exporter
              tag: v1.4.0
            envFrom:
              - secretRef:
                  name: jellyfin-exporter-secret
            ports:
              - name: metrics
                containerPort: 9594
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 9594
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 9594
                  initialDelaySeconds: 5
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: 9594
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 12
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
    service:
      main:
        controller: main
        ports:
          metrics:
            port: 9594
