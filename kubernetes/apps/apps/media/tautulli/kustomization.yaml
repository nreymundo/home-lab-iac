apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: media
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: tautulli-scripts
    files:
      - scripts/mark_watched.py
      - scripts/refresh_plex_metadata.sh
      - scripts/unmonitor_movie.sh
components:
  - ../../../../components/bjw-s-defaults
  - ../../../../components/ingress/traefik-base
resources:
  - helmrelease.yaml
  - tautulli-secrets.sops.yaml
