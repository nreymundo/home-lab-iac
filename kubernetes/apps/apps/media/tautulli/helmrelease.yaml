apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tautulli
  namespace: media
spec:
  chart:
    spec:
      chart: app-template
  values:
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              # renovate: datasource=docker depName=linuxserver/tautulli registryUrl=https://lscr.io
              repository: lscr.io/linuxserver/tautulli
              tag: 2.17.0
            env:
              TZ: Europe/Berlin
              PLEX_URL: http://plex.media.svc.cluster.local:32400
              PLEX_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: tautulli-secrets
                    key: PLEX_TOKEN
              RADARR_URL: http://radarr.media.svc.cluster.local:7878
              RADARR_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: tautulli-secrets
                    key: RADARR_API_KEY
            ports:
              - name: http
                containerPort: 8181
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 8181
    ingress:
      main:
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: traefik-gatekeeper-auth-chain@kubernetescrd
          external-dns.alpha.kubernetes.io/hostname: tautulli.lan.${CLUSTER_DOMAIN}
          gethomepage.dev/name: Tautulli
          gethomepage.dev/description: Plex monitoring
          gethomepage.dev/group: Media
          gethomepage.dev/icon: tautulli.png
          gethomepage.dev/enabled: "true"
          gethomepage.dev/pod-selector: app.kubernetes.io/name=tautulli,app.kubernetes.io/instance=tautulli
        hosts:
          - host: tautulli.lan.${CLUSTER_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: main
                  port: http
      api:
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: traefik-lan-allowlist@kubernetescrd
        hosts:
          - host: tautulli.lan.${CLUSTER_DOMAIN}
            paths:
              - path: /api
                service:
                  identifier: main
                  port: http
      newsletter:
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: traefik-lan-allowlist@kubernetescrd
        hosts:
          - host: tautulli.lan.${CLUSTER_DOMAIN}
            paths:
              - path: /newsletter
                service:
                  identifier: main
                  port: http
      image:
        annotations:
          traefik.ingress.kubernetes.io/router.middlewares: traefik-lan-allowlist@kubernetescrd
        hosts:
          - host: tautulli.lan.${CLUSTER_DOMAIN}
            paths:
              - path: /image
                service:
                  identifier: main
                  port: http
    persistence:
      data:
        enabled: true
        type: custom
        volumeSpec:
          persistentVolumeClaim:
            claimName: tautulli
        globalMounts:
          - path: /config
      scripts:
        enabled: true
        type: configMap
        name: tautulli-scripts
        defaultMode: 365
        globalMounts:
          - path: /config/scripts
            readOnly: true
