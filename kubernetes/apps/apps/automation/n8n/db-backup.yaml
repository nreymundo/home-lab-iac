apiVersion: batch/v1
kind: CronJob
metadata:
  name: n8n-db-backup
  namespace: automation
  annotations:
    checkov.io/skip1: CKV_K8S_35=pg_dump consumes database credentials from libpq environment variables.
    checkov.io/skip2: CKV_K8S_40=NFS backup path ownership requires the existing UID/GID mapping.
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 99
            runAsGroup: 100
            fsGroup: 100
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: postgres:18-alpine
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eo pipefail
                  BACKUP_DIR="/backup/kubernetes/apps/$APP_NAME/db"
                  BACKUP_FILE="$BACKUP_DIR/$APP_NAME-$(date +%Y%m%d-%H%M%S).dump"
                  mkdir -p "$BACKUP_DIR"
                  echo "Starting backup for $APP_NAME..."
                  pg_dump -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -Fc -f "$BACKUP_FILE"
                  echo "Backup created: $BACKUP_FILE"
                  find "$BACKUP_DIR" -name "*.dump" -mtime +14 -delete
                  echo "Cleaned up *.dump backups older than 14 days"
              env:
                - name: APP_NAME
                  value: "n8n"
                - name: PGHOST
                  value: "n8n-pg-rw.automation.svc.cluster.local"
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: "n8n-db-secrets"
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: "n8n-db-secrets"
                      key: password
                - name: PGDATABASE
                  value: "n8n"
              volumeMounts:
                - name: backup
                  mountPath: /backup
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
          volumes:
            - name: backup
              nfs:
                server: "${UNRAID_IP}"
                path: /mnt/user/backup
            - name: tmp
              emptyDir:
                sizeLimit: 64Mi
