apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: n8n-pg
  namespace: automation
  labels:
    release: observability-kube-prometheus-stack
spec:
  inheritedMetadata:
    labels:
      recurring-job.longhorn.io/backup-daily: enabled
      recurring-job.longhorn.io/backup-weekly: enabled
  instances: 1
  monitoring:
    enablePodMonitor: true
  storage:
    size: 5Gi
    storageClass: longhorn-r2

  postgresql:
    parameters:
      wal_level: "replica"
      archive_timeout: "43200" # Wait 12 hours before shipping WALs when no activity
      archive_mode: "off"

  bootstrap:
    initdb:
      database: n8n
      owner: n8n
      secret:
        name: n8n-db-secrets
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: n8n-pg-backup
  namespace: automation
spec:
  schedule: "0 0 0 * * *"  # Daily at midnight
  suspend: true
  backupOwnerReference: self
  cluster:
    name: n8n-pg
  method: barmanObjectStore
