apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: netbird-operator-install
  namespace: flux-system
spec:
  interval: 30m
  path: ./kubernetes/infrastructure/networking/netbird/install
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infrastructure
  wait: true
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: netbird-operator
      namespace: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
