---
- name: Resolve effective SSH hardening inputs
  ansible.builtin.set_fact:
    ssh_hardening_user_effective: >-
      {{ ssh_hardening_user if ssh_hardening_user is not none else (common_user | default('pi')) }}
    ssh_hardening_authorized_keys_effective: >-
      {{ ssh_hardening_authorized_keys if ssh_hardening_authorized_keys is not none else (common_authorized_keys | default([])) }}
    ssh_hardening_enable_hushlogin_effective: >-
      {{ ssh_hardening_enable_hushlogin if ssh_hardening_enable_hushlogin is not none else (common_enable_hushlogin | default(true)) }}
    ssh_hardening_sshd_settings_effective: >-
      {{ ssh_hardening_sshd_settings if ssh_hardening_sshd_settings is not none else (common_sshd_hardening | default({
        'PermitRootLogin': 'no',
        'PasswordAuthentication': 'no',
        'ChallengeResponseAuthentication': 'no'
      })) }}

- name: Ensure sshd runtime directory exists for config validation
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Harden sshd configuration
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^{{ item.key }}\\s+"
    line: "{{ item.key }} {{ item.value }}"
    validate: "/usr/sbin/sshd -t -f %s"
    create: false
    state: present
    backup: true
  loop: "{{ ssh_hardening_sshd_settings_effective | dict2items }}"
  notify: Restart sshd

- name: Ensure user home exists
  ansible.builtin.file:
    path: "/home/{{ ssh_hardening_user_effective }}"
    state: directory
    owner: "{{ ssh_hardening_user_effective }}"
    group: "{{ ssh_hardening_user_effective }}"
    mode: "0755"
  when: ssh_hardening_user_effective | lower != 'root'

- name: Ensure authorized SSH keys are present
  ansible.posix.authorized_key:
    user: "{{ ssh_hardening_user_effective }}"
    state: present
    key: "{{ item }}"
  loop: "{{ ssh_hardening_authorized_keys_effective }}"
  when: ssh_hardening_authorized_keys_effective | length > 0

- name: Ensure hush login file exists
  ansible.builtin.file:
    path: "/home/{{ ssh_hardening_user_effective }}/.hushlogin"
    state: touch
    owner: "{{ ssh_hardening_user_effective }}"
    group: "{{ ssh_hardening_user_effective }}"
    mode: "0644"
  when:
    - ssh_hardening_enable_hushlogin_effective | bool
    - ssh_hardening_user_effective | lower != 'root'

- name: Refresh sshd to pick up config changes
  ansible.builtin.meta: flush_handlers
