---
# Baseline kernel parameters for all Proxmox hosts.
proxmox_kernel_params_base_add: []
proxmox_kernel_params_base_remove: []

# Host-specific kernel parameter overrides (set in host_vars).
proxmox_kernel_params_add: []
proxmox_kernel_params_remove: []

# Host-specific modprobe blacklist entries (module names).
proxmox_modprobe_blacklist: []

# Host-specific modprobe options entries (without the 'options' keyword).
proxmox_modprobe_options: []

proxmox_zfs_thin_pools:
  - ssd-zfs
proxmox_zfs_thin_enforce: false
proxmox_zfs_thin_audit: true

# --- Host directories ---
proxmox_host_directories:
  - path: /mnt/unraid/proxmox
    owner: root
    group: root
    mode: "0755"
  - path: /mnt/unraid/backup
    owner: root
    group: root
    mode: "0755"
proxmox_extra_host_directories: []

# --- Swap ---
proxmox_swapfile_path: /swapfile
proxmox_swapfile_size: 16G
proxmox_swapfile_size_bytes: 17179869184
proxmox_swappiness: 10

# --- ZFS ARC ---
proxmox_zfs_arc_min_bytes: 1073741824  # 1 GiB
proxmox_zfs_arc_max_bytes: 4294967296  # 4 GiB

# --- CoreFreq (DKMS) ---
proxmox_corefreq_enabled: false

proxmox_corefreq_version: "2.00"
proxmox_corefreq_cleanup_versions:
  - "2.00"
  - "2.01"
proxmox_corefreq_git_repo: "https://github.com/cyring/CoreFreq.git"
proxmox_corefreq_git_ref: "master"

proxmox_corefreq_modprobe_options: >-
  options corefreqk
  Register_ClockSource=1
  Register_CPU_Freq=1
  Register_Governor=1
  Register_CPU_Idle=1
  Override_SubCstate="1,1,1,1,1,1,0,0"

# --- Power tuning ---
proxmox_power_tuning_enabled: false
proxmox_power_tuning_start_now: false
proxmox_power_cpu_governor: ""
proxmox_power_cpu_epp: ""
proxmox_power_cpu_boost: true
proxmox_power_powertop_auto_tune: false
proxmox_power_tuning_extra_commands: []
proxmox_power_tuning_units_to_remove: []
proxmox_power_tuning_remove_legacy_cron: true
proxmox_power_tuning_cron_entries_to_remove: []

# --- GPU passthrough ---
proxmox_gpu_passthrough_cleanup: true

# --- AMD AI/GPU host support ---
proxmox_install_ai_amd_packages: false
proxmox_ai_amd_kernel_modules:
  - amdgpu
proxmox_ai_amd_required_devices:
  - /dev/kfd
  - /dev/dri/renderD128
proxmox_ai_amd_packages:
  - amd64-microcode
  - pve-firmware
  - mesa-vulkan-drivers
  - vulkan-tools
  - mesa-utils
  - vainfo
  - radeontop
  - libdrm-tests
  - rocminfo
  - rocm-smi
  - amd-smi
  - rocm-opencl-icd
