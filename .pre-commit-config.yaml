---
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-added-large-files
      - id: check-yaml
        args: ["--allow-multiple-documents"]
        exclude: ^kubernetes/clusters/production/flux-system/

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        files: \.ya?ml$
        exclude: (^kubernetes/clusters/production/flux-system/|\.sops\.ya?ml$)

  - repo: local
    hooks:
      - id: ansible-lint
        name: ansible-lint
        entry: env ANSIBLE_CONFIG=ansible/ansible.cfg ansible-lint
        language: system
        files: ^ansible/.*\.(ya?ml|j2|cfg|ini)$
        args: ["--project-dir", "ansible"]
        pass_filenames: true
        always_run: false

      - id: packer-fmt
        name: Packer fmt
        entry: packer fmt -recursive packer/
        language: system
        files: ^packer/.*\.pkr\.hcl$
        pass_filenames: false

      - id: terraform-fmt
        name: Terraform fmt
        entry: terraform fmt -recursive terraform
        language: system
        files: ^terraform/.*\.tf$
        pass_filenames: false

      # Block committing private key material (age + common key files)
      - id: forbid-sensitive-files
        name: Forbid committing key material (age/private keys)
        entry: scripts/forbid-sensitive-files.sh
        language: system
        pass_filenames: false

      # Block committing plaintext Kubernetes Secret manifests
      - id: prevent-plaintext-k8s-secrets
        name: Block plaintext Kubernetes Secret manifests
        entry: scripts/prevent-plaintext-k8s-secrets.sh
        language: system
        pass_filenames: false

      - id: kubeconform
        name: kubeconform rendered Kubernetes manifests
        entry: scripts/kubeconform.sh
        language: system
        files: ^kubernetes/.*\.ya?ml$
        pass_filenames: false

      - id: trivy-fs
        name: Trivy filesystem scan
        entry: >-
          trivy fs --scanners vuln,secret --severity HIGH,CRITICAL
          --ignore-unfixed --skip-dirs .git
          --skip-dirs kubernetes/clusters/production/flux-system --exit-code 1 .
        language: system
        pass_filenames: false
        stages: [manual]

      - id: checkov
        name: Checkov IaC scan
        entry: checkov --config-file .checkov.yaml
        language: system
        pass_filenames: false
        stages: [manual]

      # Auto-encrypt *.sops.yaml files if they are not already encrypted
      - id: sops-auto-encrypt
        name: Auto-encrypt *.sops.yaml with sops (skip if already encrypted)
        entry: scripts/sops-auto-encrypt.sh
        language: system
        files: \.sops\.ya?ml$
        exclude: ^\.sops\.yaml$
        pass_filenames: true

      - id: forbid-commit-attribution
        name: Forbid commit attribution trailers
        entry: scripts/forbid-commit-attribution-trailers.sh
        language: system
        stages: [commit-msg]
